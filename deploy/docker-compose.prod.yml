###############################################################################
# Production docker-compose.yml — sits on the EC2 at /opt/mda-dashboard/
# Pulled from ECR, env populated from Secrets Manager via the entrypoint script.
###############################################################################

services:
  api:
    image: ${ECR_REPO_URL}:latest
    container_name: mda-dashboard-api
    restart: unless-stopped
    ports:
      - "8080:8080"  # ALB target group targets this port
    env_file:
      - /opt/mda-dashboard/.env  # written by /opt/mda-dashboard/refresh-env.sh
    environment:
      - REDIS_URL=redis://redis:6379/0
      # Serve the APK from the bind-mounted host dir (below), not the in-image
      # default (/app/apk). Without this the /apk route looks in the wrong
      # place and reports "APK not available yet".
      - APK_DIR=/var/app-apk
      # Force-update floor: installs with versionCode < this get HTTP 426 on
      # /api/app/* and the blocking "Update required" wall. 116 = the first
      # release-signed build. Raise this to force everyone onto a newer build
      # (publish the APK first). 0 disables the gate.
      - MIN_VERSION_CODE=116
    volumes:
      - uploads:/app/uploads
      # Static APK host. The app-build CI pipeline uploads the signed APK to
      # /var/app-apk on the EC2 host; the API serves it at /apk (read-only
      # mount so the running app can never mutate the artifact). Matches
      # APK_DIR=/var/app-apk in the .env.
      - /var/app-apk:/var/app-apk:ro
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --proxy-headers --forwarded-allow-ips='*'
    healthcheck:
      # The python:3.11-slim image doesn't ship curl. Use the stdlib's
      # urllib instead so the healthcheck reflects real container state —
      # the prod container has been reporting 'unhealthy' indefinitely
      # even though /api/health returns 200, masking any real outage.
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/api/health', timeout=3).status==200 else 1)\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: awslogs
      options:
        awslogs-group: /mda-dashboard/app
        awslogs-region: us-east-1
        awslogs-create-group: "true"
        tag: "api"

  redis:
    image: redis:7-alpine
    container_name: mda-dashboard-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    logging:
      driver: awslogs
      options:
        awslogs-group: /mda-dashboard/app
        awslogs-region: us-east-1
        awslogs-create-group: "true"
        tag: "redis"

  # Dedicated CommCare-sync worker. Same image as the API but its CMD runs
  # the worker loop instead of uvicorn — so a `Deploy on push to main` that
  # pulls a new image and restarts the API does NOT kill an in-flight sync
  # job on this container. Sync code changes still require a worker
  # restart; the standard deploy hook restarts both api + sync_worker so
  # this only matters if you redeploy the API without redeploying the
  # worker (which the current deploy script does not do).
  sync_worker:
    image: ${ECR_REPO_URL}:latest
    container_name: mda-dashboard-sync-worker
    restart: unless-stopped
    env_file:
      - /opt/mda-dashboard/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    command: python -m app.sync_worker
    logging:
      driver: awslogs
      options:
        awslogs-group: /mda-dashboard/app
        awslogs-region: us-east-1
        awslogs-create-group: "true"
        tag: "sync_worker"

volumes:
  uploads:
  redisdata:
