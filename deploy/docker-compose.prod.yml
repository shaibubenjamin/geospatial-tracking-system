###############################################################################
# Production docker-compose.yml — sits on the EC2 at /opt/mda-dashboard/
# Pulled from ECR, env populated from Secrets Manager via the entrypoint script.
###############################################################################

services:
  api:
    image: ${ECR_REPO_URL}:latest
    container_name: mda-dashboard-api
    restart: unless-stopped
    ports:
      - "8080:8080"  # ALB target group targets this port
    env_file:
      - /opt/mda-dashboard/.env  # written by /opt/mda-dashboard/refresh-env.sh
    volumes:
      - uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --proxy-headers --forwarded-allow-ips='*'
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: awslogs
      options:
        awslogs-group: /mda-dashboard/app
        awslogs-region: us-east-1
        awslogs-create-group: "true"
        tag: "api"

  redis:
    image: redis:7-alpine
    container_name: mda-dashboard-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    logging:
      driver: awslogs
      options:
        awslogs-group: /mda-dashboard/app
        awslogs-region: us-east-1
        awslogs-create-group: "true"
        tag: "redis"

volumes:
  uploads:
  redisdata:
