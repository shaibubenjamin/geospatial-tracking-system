[pytest]
# Async tests run automatically — no @pytest.mark.asyncio decorator needed.
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    livedb: test requires a reachable PostgreSQL + the full Docker stack
    redis: test requires a reachable Redis
