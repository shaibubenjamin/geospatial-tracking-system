<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>ERITAS MDA</title>
  <!-- Mirrors the web platform's campaign sections on mobile. Calls the same
       APIs as the web (/api/app/* and /api/mda/*, token-authorised), so data
       updates on the web reflect here automatically. Chart.js = Canvas2D (no
       WebGL) so it renders in the Android WebView. -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root{--green:#006B2E;--green2:#16A34A;--amber:#f59e0b;--red:#dc2626;--blue:#0EA5E9;--ink:#111827;--muted:#6b7280;--line:#e6e8eb;--bg:#f3f4f6}
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:-apple-system,Segoe UI,Roboto,sans-serif;font-size:13px}
    /* Section switcher = the web sidebar, as a sticky horizontal pill bar. */
    #nav{position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid var(--line);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:6px;padding:8px 10px;white-space:nowrap}
    #nav button{flex:0 0 auto;border:1px solid var(--line);background:#fff;color:#374151;border-radius:999px;padding:7px 13px;font-size:12px;font-weight:600;cursor:pointer}
    #nav button.on{background:var(--green);border-color:var(--green);color:#fff}
    .wrap{padding:12px 12px 28px}
    .hero{border-radius:16px;padding:15px 18px;color:#fff;margin-bottom:12px}
    .hero .lbl{font-size:12px;opacity:.92}.hero .pct{font-size:38px;font-weight:800;line-height:1.05}.hero .sub{font-size:10.5px;opacity:.9;margin-top:4px}
    .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#fff;border:1px solid var(--line);border-radius:12px;padding:9px 10px}
    .kpi .v{font-size:16px;font-weight:800;line-height:1.1}.kpi .l{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.2}
    .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px;margin-top:12px}
    .card h3{margin:0 0 2px;font-size:13px}.card .csub{font-size:11px;color:var(--muted);margin-bottom:8px}
    .row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f1f3f5}
    .row:last-child{border-bottom:0}
    .row .nm{flex:1;min-width:0;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .row .nm small{display:block;font-weight:500;color:var(--muted);font-size:10.5px}
    .row .rt{flex:0 0 92px;text-align:right;font-weight:800}
    .bar{height:6px;border-radius:4px;background:#eef0f2;margin-top:4px;overflow:hidden}.bar>i{display:block;height:100%}
    table{width:100%;border-collapse:collapse;font-size:11.5px}
    th,td{padding:6px 6px;text-align:right;border-bottom:1px solid #f1f3f5}th:first-child,td:first-child{text-align:left}
    th{color:var(--muted);font-weight:600;font-size:10.5px}
    .pillbadge{display:inline-block;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:700;color:#fff}
    #msg{padding:22px 12px;text-align:center;color:var(--muted)}#msg.err{color:#b91c1c}
    /* Charts MUST have a bounded-height parent - with maintainAspectRatio:false
       and no container height, Chart.js grows the canvas to ~1000px (the "lag").*/
    .chartbox{position:relative;height:185px;margin-top:6px}
    canvas{max-width:100%}
  </style>
</head>
<body>
  <div id="nav"></div>
  <div class="wrap" id="wrap"><div id="msg">Loading…</div></div>
  <script>
    function qp(n){ return new URLSearchParams(location.search).get(n); }
    var token=(location.hash.match(/token=([^&]+)/)||[])[1]||'';
    var pid=qp('project_id'), q=pid?('?project_id='+encodeURIComponent(pid)):'', qa=pid?('&project_id='+encodeURIComponent(pid)):'';
    function get(u){ return fetch(u,{headers:{'Authorization':'Bearer '+token,'X-App-Version-Code':'999999'}})
      .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); }); }
    // Full actual numbers with thousands separators (no k/M abbreviation).
    function fmt(n){ return (Math.round(+n||0)).toLocaleString(); }
    function pc(n){ return (Math.round((+n||0)*10)/10); }
    function covColor(p){ p=+p||0; return p>=80?'#006B2E':p>=60?'#16A34A':p>=40?'#f59e0b':'#dc2626'; }
    var W=document.getElementById('wrap'); function msg(t,e){ W.innerHTML='<div id="msg"'+(e?' class="err"':'')+'>'+t+'</div>'; }
    function kpi(l,v){ return '<div class="kpi"><div class="v">'+v+'</div><div class="l">'+l+'</div></div>'; }
    var cache={}, chart=null;
    function cget(u){ if(cache[u])return Promise.resolve(cache[u]); return get(u).then(function(d){cache[u]=d;return d;}); }
    function destroyChart(){ if(chart){chart.destroy();chart=null;} }

    var SECTIONS=[['overview','Overview'],['coverage','Coverage'],['quality','Quality'],['teams','Teams'],['trends','Trends'],['lga','LGA Coverage']];
    var nav=document.getElementById('nav');
    SECTIONS.forEach(function(s){ var b=document.createElement('button'); b.textContent=s[1]; b.dataset.s=s[0];
      b.onclick=function(){ go(s[0]); }; nav.appendChild(b); });
    function go(name){ Array.prototype.forEach.call(nav.children,function(b){ b.className=b.dataset.s===name?'on':''; });
      destroyChart(); msg('Loading…'); RENDER[name](); }

    var RENDER={};

    // ── OVERVIEW ─────────────────────────────────────────────────────────────
    RENDER.overview=function(){ Promise.all([cget('/api/app/overview'+q), cget('/api/app/trends/daily'+q).catch(function(){return[];})])
      .then(function(r){ var d=r[0]||{},daily=r[1]||[]; var cov=+d.coverage_pct||0;
        var day=(d.current_campaign_day!=null)?(d.planned_duration_days!=null?d.current_campaign_day+' / '+d.planned_duration_days:String(d.current_campaign_day)):'-';
        var avg=d.teams_active>0?Math.round(d.total_forms/d.teams_active):'-';
        var ks=[['Children treated',fmt(d.total_treated)],['Forms submitted',fmt(d.total_forms)],['Teams active',fmt(d.teams_active)],
          ['LGAs covered',String(d.lgas_covered||0)],['Campaign day',day],['Campaign duration',(d.planned_duration_days!=null?d.planned_duration_days+' days':'-')],
          ['QC flags',fmt(d.total_qc_flags)],['Error rate',pc(d.error_rate_pct)+'%'],['Refusals',fmt(d.refusals)],
          ['Avg forms/team',String(avg)],['GPS outside LGA',fmt(d.gps_outside_lga)],['Fast forms',fmt(d.fast_forms)]];
        W.innerHTML='<div class="hero" style="background:'+covColor(cov)+'"><div class="lbl">Administrative coverage</div><div class="pct">'+cov.toFixed(0)+'%</div>'+
          '<div class="sub">Children treated ÷ baseline target · 80% is the protective threshold</div></div>'+
          '<div class="grid">'+ks.map(function(k){return kpi(k[0],k[1]);}).join('')+'</div>'+
          '<div class="card"><h3>Cumulative coverage over campaign days</h3><div class="csub" id="ts"></div><div class="chartbox"><canvas id="c"></canvas></div></div>';
        lineTrend(daily,d.baseline_total||0);
      }).catch(function(e){ msg('Could not load overview: '+e.message,true); }); };

    function lineTrend(daily,baseline){ if(!daily.length||!window.Chart){document.getElementById('ts').textContent='No daily data yet.';return;}
      var acc=0,labels=[],data=[]; daily.forEach(function(p){acc+=(p.treated||0);labels.push((p.date||'').slice(5));data.push(baseline>0?+(100*acc/baseline).toFixed(1):acc);});
      document.getElementById('ts').textContent=daily.length+' day(s) · '+(baseline>0?'% of target':'cumulative treated');
      chart=new Chart(document.getElementById('c'),{type:'line',data:{labels:labels,datasets:[{data:data,borderColor:'#006B2E',backgroundColor:'rgba(0,107,46,.15)',fill:true,tension:.3,borderWidth:2.5,pointRadius:3,pointBackgroundColor:'#006B2E'}]},
        options:{animation:false,plugins:{legend:{display:false}},maintainAspectRatio:false,scales:{y:{ticks:{callback:function(v){return baseline>0?v+'%':v;},font:{size:10}},grid:{color:'#f1f3f5'}},x:{ticks:{font:{size:9},maxRotation:0,autoSkip:true,maxTicksLimit:6},grid:{display:false}}}}}); }

    // ── COVERAGE ANALYSIS ─────────────────────────────────────────────────────
    RENDER.coverage=function(){ Promise.all([cget('/api/app/overview'+q), cget('/api/app/coverage/lga'+q)])
      .then(function(r){ var d=r[0]||{}, rows=(r[1]||[]).slice().sort(function(a,b){return b.coverage_pct-a.coverage_pct;});
        var good=rows.filter(function(l){return l.coverage_pct>=80;}).length, below=rows.filter(function(l){return l.coverage_pct<60;}).length;
        W.innerHTML='<div class="grid">'+kpi('Overall coverage',pc(d.coverage_pct)+'%')+kpi('Baseline target',fmt(d.baseline_total))+kpi('Treated',fmt(d.total_treated))+
          kpi('LGAs ≥80%',good+' / '+rows.length)+kpi('LGAs <60%',below+' / '+rows.length)+kpi('Campaign day',(d.current_campaign_day||'-'))+'</div>'+
          '<div class="card"><h3>Treatment coverage by LGA</h3><div class="csub">Treated ÷ baseline · sorted</div><div id="lgalist"></div></div>';
        var L=document.getElementById('lgalist');
        L.innerHTML=rows.map(function(l){var c=covColor(l.coverage_pct),w=Math.max(0,Math.min(100,l.coverage_pct));
          return '<div class="row"><div class="nm">'+l.lga+'<small>'+fmt(l.actual_treated)+' / '+fmt(l.baseline_total)+' · '+(l.teams||0)+' teams</small>'+
            '<div class="bar"><i style="width:'+w+'%;background:'+c+'"></i></div></div><div class="rt" style="color:'+c+'">'+pc(l.coverage_pct)+'%</div></div>';}).join('');
      }).catch(function(e){ msg('Could not load coverage: '+e.message,true); }); };

    // ── QUALITY CHECKS ────────────────────────────────────────────────────────
    RENDER.quality=function(){ cget('/api/mda/qc/summary'+q).then(function(d){
        var gps=(d.gps_outside_lga||0)+(d.gps_poor_accuracy||0)+(d.gps_zero||0)+(d.duplicate_gps||0);
        var timing=(d.fast_forms||0)+(d.slow_forms||0)+(d.after_hours||0);
        W.innerHTML='<div class="grid">'+kpi('Total QC flags',fmt(d.total_qc_flags))+kpi('Error rate',pc(d.error_rate_pct)+'%')+kpi('GPS issues',fmt(gps))+
          kpi('Timing issues',fmt(timing))+kpi('Refusals',fmt(d.refusals)+' ('+pc(d.refusal_pct)+'%)')+kpi('Field staff',fmt(d.ra_count))+'</div>'+
          '<div class="card"><h3>Flag breakdown</h3><div class="csub">Counts across '+fmt(d.total_forms)+' forms</div><div id="qcb"></div></div>';
        var items=[['Fast forms',d.fast_forms],['Slow forms',d.slow_forms],['After-hours',d.after_hours],['Duplicate GPS',d.duplicate_gps],
          ['GPS outside LGA',d.gps_outside_lga],['GPS outside ward',d.gps_outside_ward],['Poor GPS accuracy',d.gps_poor_accuracy],['Duplicates',d.duplicates]];
        document.getElementById('qcb').innerHTML=items.map(function(it){var v=it[1]||0,pct=d.total_forms>0?(100*v/d.total_forms):0;
          return '<div class="row"><div class="nm">'+it[0]+'</div><div class="rt">'+fmt(v)+' <span style="color:#6b7280;font-weight:600;font-size:10.5px">('+pc(pct)+'%)</span></div></div>';}).join('');
      }).catch(function(e){ msg('Could not load quality checks: '+e.message,true); }); };

    // ── TEAMS PERFORMANCE ─────────────────────────────────────────────────────
    RENDER.teams=function(){ cget('/api/mda/teams/performance'+q).then(function(rows){ rows=rows||[];
        var total=rows.length, meeting=rows.filter(function(t){return t.meets_target;}).length;
        var forms=rows.reduce(function(a,t){return a+(t.total_forms||0);},0); var avg=total>0?Math.round(forms/total):0;
        var top=rows.slice().sort(function(a,b){return b.total_forms-a.total_forms;}).slice(0,20);
        W.innerHTML='<div class="grid">'+kpi('Teams active',fmt(total))+kpi('Meeting target',meeting+' / '+total)+kpi('Below target',(total-meeting)+' / '+total)+
          kpi('Avg forms/team',fmt(avg))+'</div>'+
          '<div class="card"><h3>Top teams by forms</h3><div class="csub">'+fmt(total)+' teams · showing top 20</div>'+
          '<table><thead><tr><th>Team</th><th>LGA</th><th>Forms</th><th>/day</th><th>Treated</th></tr></thead><tbody id="tb"></tbody></table></div>';
        document.getElementById('tb').innerHTML=top.map(function(t){return '<tr><td>'+(t.hq_user||'-')+(t.meets_target?' ✓':'')+'</td><td>'+(t.lga||'-')+'</td><td>'+fmt(t.total_forms)+'</td><td>'+Math.round(t.avg_per_day||0)+'</td><td>'+fmt(t.total_treated)+'</td></tr>';}).join('');
      }).catch(function(e){ msg('Could not load teams: '+e.message,true); }); };

    // ── CAMPAIGN TRENDS ───────────────────────────────────────────────────────
    RENDER.trends=function(){ Promise.all([cget('/api/app/trends/daily'+q), cget('/api/mda/rounds/summary'+q).catch(function(){return[];})])
      .then(function(r){ var daily=r[0]||[], rounds=r[1]||[];
        W.innerHTML='<div class="card"><h3>Daily forms submitted</h3><div class="csub" id="ds"></div><div class="chartbox"><canvas id="c"></canvas></div></div>'+
          '<div class="card"><h3>Round-over-round comparison</h3><table><thead><tr><th>Round</th><th>Targeted</th><th>Treated</th><th>Cov%</th><th>Forms</th></tr></thead><tbody id="rb"></tbody></table></div>';
        document.getElementById('ds').textContent=daily.length+' day(s)';
        if(daily.length&&window.Chart){ chart=new Chart(document.getElementById('c'),{type:'bar',
          data:{labels:daily.map(function(p){return (p.date||'').slice(5);}),datasets:[{data:daily.map(function(p){return p.forms||0;}),backgroundColor:'#16A34A',borderRadius:4}]},
          options:{animation:false,plugins:{legend:{display:false}},maintainAspectRatio:false,scales:{y:{ticks:{font:{size:10}},grid:{color:'#f1f3f5'}},x:{ticks:{font:{size:9},maxRotation:0,autoSkip:true,maxTicksLimit:7},grid:{display:false}}}}}); }
        document.getElementById('rb').innerHTML=rounds.map(function(rd){return '<tr><td>'+(rd.round_label||'-')+'</td><td>'+fmt(rd.targeted)+'</td><td>'+fmt(rd.administered)+'</td><td>'+pc(rd.coverage_pct)+'%</td><td>'+fmt(rd.total_forms)+'</td></tr>';}).join('');
      }).catch(function(e){ msg('Could not load trends: '+e.message,true); }); };

    // ── LGA COVERAGE (drill: LGA → ward → settlement, by % visited) ──────────
    var lgaState={level:'lga',lga:null,ward:null};
    function lprops(fc){ return (fc&&fc.features?fc.features.map(function(f){return f.properties||{};}):[]); }
    function lavg(rows,k){ if(!rows.length)return 0; var s=0,n=0; rows.forEach(function(r){if(r[k]!=null){s+=+r[k];n++;}}); return n?s/n:0; }
    function lbar(pct){ var c=covColor(pct); return '<div class="bar"><i style="width:'+Math.max(0,Math.min(100,+pct||0))+'%;background:'+c+'"></i></div>'; }
    function lback(t){ return '<button onclick="lgaBack()" style="border:0;background:#eef2ff;color:#3730a3;border-radius:8px;padding:6px 11px;font-weight:700;font-size:12px;margin-bottom:8px">‹ '+t+'</button>'; }
    function mapBtn(code){ return '<button onclick="viewMap(\''+code+'\',event)" style="border:0;background:var(--green);color:#fff;border-radius:8px;padding:6px 11px;font-weight:700;font-size:12px;margin:0 0 8px 6px">📍 View on map</button>'; }
    window.lgaBack=function(){ if(lgaState.level==='settlement'){lgaState.level='ward';} else {lgaState.level='lga';lgaState.lga=null;} drawLga(); };
    window.lgaOpen=function(code){ lgaState.lga=lprops(window._lgasFC).filter(function(x){return x.lgacode===code;})[0]; lgaState.level='ward'; drawLga(); };
    window.wardOpen=function(name){ lgaState.ward=lprops(window._wardsFC).filter(function(x){return x.lga_name===lgaState.lga.lga_name && x.ward_name===name;})[0]; lgaState.level='settlement'; drawLga(); };
    window.viewMap=function(code,ev){ if(ev)ev.stopPropagation(); if(window.Native&&Native.openMap){ Native.openMap(code); } else { window.open('/app/map?focus='+encodeURIComponent(code)+qa+location.hash,'_blank'); } };

    RENDER.lga=function(){ Promise.all([cget('/api/app/geo/lgas'+q),cget('/api/app/geo/wards'+q)])
      .then(function(r){ window._lgasFC=r[0]; window._wardsFC=r[1]; lgaState={level:'lga',lga:null,ward:null}; drawLga(); })
      .catch(function(e){ msg('Could not load LGA coverage: '+e.message,true); }); };

    function drawLga(){ destroyChart();
      if(lgaState.level==='lga'){
        var rows=lprops(window._lgasFC).slice().sort(function(a,b){return b.visitation_pct-a.visitation_pct;});
        W.innerHTML='<div class="card"><h3>LGA coverage - % visited</h3><div class="csub">'+rows.length+' LGAs · avg '+lavg(rows,'visitation_pct').toFixed(0)+'% · tap to drill · 📍 to map</div><div id="ll"></div></div>';
        document.getElementById('ll').innerHTML=rows.map(function(p){ var c=covColor(p.visitation_pct);
          return '<div class="row" onclick="lgaOpen(\''+p.lgacode+'\')" style="cursor:pointer"><div class="nm">'+(p.lga_name||p.lgacode)+lbar(p.visitation_pct)+'</div>'+
            '<div class="rt" style="color:'+c+'">'+pc(p.visitation_pct)+'%</div>'+
            '<button onclick="viewMap(\''+p.lgacode+'\',event)" style="border:0;background:#f1f5f9;border-radius:8px;padding:6px 9px;margin-left:6px;font-size:15px">📍</button></div>'; }).join('');
      } else if(lgaState.level==='ward'){
        var lga=lgaState.lga;
        var rows=lprops(window._wardsFC).filter(function(w){return w.lga_name===lga.lga_name;}).sort(function(a,b){return b.visitation_pct-a.visitation_pct;});
        W.innerHTML='<div class="card">'+lback('LGAs')+mapBtn(lga.lgacode)+'<h3>'+lga.lga_name+' - wards</h3><div class="csub">'+rows.length+' wards · avg '+lavg(rows,'visitation_pct').toFixed(0)+'% visited · LGA '+pc(lga.visitation_pct)+'%</div><div id="ll"></div></div>';
        document.getElementById('ll').innerHTML=rows.length?rows.map(function(w){ var c=covColor(w.visitation_pct), nm=(w.ward_name||'').replace(/'/g,"\\'");
          return '<div class="row" onclick="wardOpen(\''+nm+'\')" style="cursor:pointer"><div class="nm">'+(w.ward_name||w.wardcode)+'<small>'+(w.settlements_visited||0)+' / '+(w.settlements||0)+' settlements visited</small>'+lbar(w.visitation_pct)+'</div><div class="rt" style="color:'+c+'">'+pc(w.visitation_pct)+'%</div></div>'; }).join(''):'<div id="msg">No wards.</div>';
      } else {
        var w=lgaState.ward, code=lgaState.lga.lgacode;
        W.innerHTML='<div class="card">'+lback('Wards')+mapBtn(lgaState.lga.lgacode)+'<h3>'+w.ward_name+' - settlements</h3><div class="csub" id="ss">Loading…</div><div id="ll"></div></div>';
        cget('/api/app/geo/settlements?lgacode='+encodeURIComponent(code)+qa).then(function(d){
          var rows=(d.features||[]).map(function(f){return f.properties;}).filter(function(s){return s.ward_name===w.ward_name;});
          var nv=rows.filter(function(s){return s.is_visited;}).length;
          document.getElementById('ss').textContent=rows.length+' settlements · '+nv+' visited';
          document.getElementById('ll').innerHTML=rows.length?rows.map(function(s){ var cp=(s.completeness_pct!=null?s.completeness_pct:(s.is_visited?100:0)); var c=covColor(cp);
            return '<div class="row"><div class="nm">'+(s.settlement_name||'-')+lbar(cp)+'</div><div class="rt" style="color:'+c+'">'+pc(cp)+'%</div></div>'; }).join(''):'<div id="msg">No settlements.</div>';
        }).catch(function(e){ document.getElementById('ss').textContent='Error: '+e.message; });
      }
    }

    // Allow deep-linking a section (?section=trends) for previews; default Overview.
    var _start=qp('section'); go(SECTIONS.some(function(s){return s[0]===_start;})?_start:'overview');
  </script>
</body>
</html>
