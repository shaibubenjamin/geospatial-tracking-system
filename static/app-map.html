<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#E8EAED;font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:#111827}
    /* Full-screen map. Height is set in JS to window.innerHeight (the WebView's
       CSS % height is unreliable), so the map always fills the tab. */
    #map{width:100%;height:100vh}
    .pill{position:absolute;z-index:1000;background:rgba(255,255,255,.95);border-radius:10px;
          padding:7px 11px;box-shadow:0 2px 10px rgba(0,0,0,.18)}
    #hud{top:8px;left:8px;right:8px;font-size:12px}
    #hud b{font-size:13px}
    #hud small{color:#6b7280}
    #legend{bottom:10px;left:8px;font-size:10px;color:#374151;display:flex;align-items:center;flex-wrap:wrap;gap:2px}
    #legend i{display:inline-block;width:11px;height:11px;border-radius:2px;margin:0 3px 0 8px;vertical-align:-1px}
    #legend .dot{width:9px;height:9px;border-radius:50%;border:1px solid #fff}
    #err{top:50%;left:8px;right:8px;transform:translateY(-50%);text-align:center;color:#b91c1c;display:none}
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="hud" class="pill"><b id="hud-title">Loading…</b><br><small id="hud-hint"></small></div>
  <div id="legend" class="pill">
    <span id="lg-area"><i style="background:#dc2626"></i>&lt;40<i style="background:#f59e0b"></i>40–70<i style="background:#16a34a"></i>≥70% visited</span>
    <span id="lg-pts" style="display:none"><i class="dot" style="background:#16a34a"></i>in&nbsp;<i class="dot" style="background:#dc2626"></i>out</span>
  </div>
  <div id="err" class="pill"></div>
  <script>
    function qp(n){ return new URLSearchParams(location.search).get(n); }
    var token=(location.hash.match(/token=([^&]+)/)||[])[1]||'';
    var pid=qp('project_id'), q=pid?('?project_id='+encodeURIComponent(pid)):'';
    function get(u){ return fetch(u,{headers:{'Authorization':'Bearer '+token,'X-App-Version-Code':'999999'}})
      .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); }); }
    function visColor(p){ p=+p||0; return p>=70?'#16a34a':p>=40?'#f59e0b':'#dc2626'; }
    function fpct(n){ return (n==null?'—':(+n).toFixed(0)+'%'); }
    function feats(d){ return (d&&d.features?d.features:[]); }
    function err(m){ var e=document.getElementById('err'); e.textContent=m; e.style.display='block'; }

    // Zoom thresholds: wards appear @9, settlements @12, GPS points @14.
    var WARD_Z=9, SETT_Z=12, PT_Z=14;

    // Size the map to the viewport (explicit px — WebView % height is unreliable).
    function sizeMap(){ var h=window.innerHeight||document.documentElement.clientHeight||600;
      document.getElementById('map').style.height=h+'px'; if(window._map) _map.invalidateSize(); }
    sizeMap(); window.addEventListener('resize',sizeMap);

    var map=L.map('map',{preferCanvas:true,zoomControl:true,attributionControl:false,
      minZoom:6,maxZoom:18}).setView([13.02,5.24],7);
    window._map=map;
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png',{subdomains:'abcd',maxZoom:19}).addTo(map);
    setTimeout(sizeMap,300); setTimeout(sizeMap,1000);

    var lgaLayer=null, wardLayer=null, settLayer=null, pointsLayer=null;
    var lgaItems=[];                 // {lgacode, bounds}
    var loadedSett={}, loadedPts={}; // lgacode → true (lazy-load guards)

    function boundsOf(feature){
      var minLat=90,minLon=180,maxLat=-90,maxLon=-180;
      (function walk(c){ if(typeof c[0]==='number'){ var lon=c[0],lat=c[1];
        if(lat<minLat)minLat=lat; if(lat>maxLat)maxLat=lat; if(lon<minLon)minLon=lon; if(lon>maxLon)maxLon=lon;
      } else c.forEach(walk); })(feature.geometry.coordinates);
      return L.latLngBounds([[minLat,minLon],[maxLat,maxLon]]);
    }

    function lgaStyle(f){ return {color:'#1f2937',weight:1.5,opacity:0.85,
      fillColor:visColor((f.properties||{}).visitation_pct),fillOpacity:0.55}; }
    function wardStyle(f){ return {color:'#374151',weight:0.8,opacity:0.7,
      fillColor:visColor((f.properties||{}).visitation_pct),fillOpacity:0.45}; }
    function settStyle(f){ var v=(f.properties||{}).is_visited;
      return {color:'#ffffff',weight:0.4,opacity:0.5,fillColor:v?'#16a34a':'#dc2626',fillOpacity:0.6}; }

    function popupArea(kind){ return function(f,layer){ var p=f.properties||{};
      var nm=p.ward_name||p.lga_name||'—';
      layer.bindPopup('<b>'+nm+'</b><br>'+kind+': <b style="color:'+visColor(p.visitation_pct)+'">'+fpct(p.visitation_pct)+' visited</b>'); }; }

    // ── progressive reveal by zoom ───────────────────────────────────────────
    function update(){
      if(!lgaLayer) return;
      var z=map.getZoom(), b=map.getBounds();

      // LGA fill fades as we zoom in; borders stay.
      lgaLayer.setStyle({fillOpacity: z<WARD_Z?0.55 : z<SETT_Z?0.12 : 0.0, opacity: z<SETT_Z?0.85:0.5});

      // Wards appear at WARD_Z.
      if(z>=WARD_Z){ if(!map.hasLayer(wardLayer)) wardLayer.addTo(map);
        wardLayer.setStyle({fillOpacity: z<SETT_Z?0.45 : 0.1, opacity:0.7}); }
      else if(map.hasLayer(wardLayer)) map.removeLayer(wardLayer);

      // Settlements appear at SETT_Z — lazy-load for each LGA in view.
      if(z>=SETT_Z){ if(!map.hasLayer(settLayer)) settLayer.addTo(map);
        lgaItems.forEach(function(it){
          if(!loadedSett[it.lgacode] && it.bounds.intersects(b)){
            loadedSett[it.lgacode]=true;
            get('/api/app/geo/settlements?lgacode='+encodeURIComponent(it.lgacode)+(pid?'&project_id='+pid:''))
              .then(function(d){ settLayer.addData(d); }).catch(function(){});
          }
        });
      } else if(map.hasLayer(settLayer)) map.removeLayer(settLayer);

      // GPS points appear at PT_Z — lazy-load per LGA in view.
      if(z>=PT_Z){ if(!map.hasLayer(pointsLayer)) pointsLayer.addTo(map); pointsLayer.bringToFront();
        lgaItems.forEach(function(it){
          if(!loadedPts[it.lgacode] && it.bounds.intersects(b)){
            loadedPts[it.lgacode]=true;
            get('/api/app/geo/points?lgacode='+encodeURIComponent(it.lgacode)+(pid?'&project_id='+pid:'')+'&limit=4000')
              .then(function(d){ pointsLayer.addData(d); }).catch(function(){});
          }
        });
      } else if(map.hasLayer(pointsLayer)) map.removeLayer(pointsLayer);

      // HUD + legend
      var t=document.getElementById('hud-title'), h=document.getElementById('hud-hint');
      if(z<WARD_Z){ t.textContent='Statewide — LGA coverage'; h.textContent='% settlements visited · pinch to zoom into wards'; }
      else if(z<SETT_Z){ t.textContent='Wards'; h.textContent='% settlements visited · zoom in for settlements'; }
      else if(z<PT_Z){ t.textContent='Settlements'; h.textContent='green = visited · red = not · zoom in for GPS points'; }
      else { t.textContent='Settlements + GPS points'; h.textContent='dots = household GPS submissions'; }
      document.getElementById('lg-pts').style.display = z>=SETT_Z?'inline':'none';
    }

    Promise.all([ get('/api/app/geo/lgas'+q), get('/api/app/geo/wards'+q) ]).then(function(res){
      var lgasFC=res[0], wardsFC=res[1];
      lgaLayer=L.geoJSON(lgasFC,{style:lgaStyle,onEachFeature:popupArea('Visitation')}).addTo(map);
      wardLayer=L.geoJSON(wardsFC,{style:wardStyle,onEachFeature:popupArea('Visitation')});
      settLayer=L.geoJSON(null,{style:settStyle,onEachFeature:function(f,l){ var p=f.properties||{};
        l.bindPopup('<b>'+(p.settlement_name||'—')+'</b><br>'+(p.is_visited?'Visited':'Not visited')); }});
      pointsLayer=L.geoJSON(null,{pointToLayer:function(f,ll){ var ib=(f.properties||{}).in_bounds;
        return L.circleMarker(ll,{radius:3,fillColor:ib?'#16a34a':'#dc2626',color:'#fff',weight:0.6,fillOpacity:0.9}); }});
      feats(lgasFC).forEach(function(f){ if(f.geometry){ var p=f.properties||{}; lgaItems.push({lgacode:p.lgacode,name:(p.lga_name||p.lga||''),bounds:boundsOf(f)}); } });
      // ?focus=<lgacode OR lga name> (from the app's Coverage tab "View on map")
      // → zoom to that LGA so its wards reveal; otherwise fit the whole state.
      // The app passes the LGA name (it has no code), so match either.
      var focus=qp('focus'), fl=focus?String(focus).trim().toLowerCase():'';
      var fit=focus&&lgaItems.filter(function(x){return x.lgacode===focus || (x.name||'').trim().toLowerCase()===fl;})[0];
      try{ if(fit){ map.fitBounds(fit.bounds,{padding:[24,24],maxZoom:11}); } else { map.fitBounds(lgaLayer.getBounds(),{padding:[16,16],maxZoom:8}); } }catch(e){}
      sizeMap(); update();
      map.on('zoomend moveend', update);
    }).catch(function(e){ err('Could not load coverage: '+e.message+'. Re-open the tab to retry.'); });
  </script>
</body>
</html>
