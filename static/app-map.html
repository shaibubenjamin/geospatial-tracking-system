<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <!-- Leaflet renders raster tiles as <img> and polygons on a 2D canvas — NO
       WebGL. MapLibre (WebGL) initialised but painted a blank canvas inside the
       Android WebView on real devices; Leaflet renders in virtually any WebView. -->
  <link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    html,body,#map{margin:0;padding:0;height:100%;width:100%;font-family:-apple-system,sans-serif;background:#E8EAED}
    .pill{position:absolute;z-index:1000;background:#fff;border-radius:8px;padding:5px 10px;font-size:11px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
    #toggles{top:8px;right:8px;display:flex;flex-direction:column;gap:3px}
    #toggles label{font-size:12px;display:flex;align-items:center;gap:6px}
    #legend{bottom:8px;left:8px;display:flex;gap:10px;align-items:center}
    #legend i{display:inline-block;width:12px;height:12px;border-radius:2px;margin-right:3px;vertical-align:-1px}
    #status{top:8px;left:8px;max-width:55%;color:#374151}
    .leaflet-popup-content{font-size:12px;margin:8px 10px;line-height:1.45}
    .leaflet-popup-content b{font-size:13px}
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="status" class="pill">Loading…</div>
  <div id="toggles" class="pill">
    <label><input type="checkbox" id="t-lga" checked> LGA</label>
    <label><input type="checkbox" id="t-ward" checked> Ward</label>
    <label><input type="checkbox" id="t-sett"> Settlement</label>
  </div>
  <div id="legend" class="pill" style="display:none">
    <span><i style="background:#dc2626"></i>&lt;40%</span>
    <span><i style="background:#f59e0b"></i>40–70%</span>
    <span><i style="background:#16a34a"></i>≥70%</span>
  </div>
  <script>
    function qp(n){ return new URLSearchParams(location.search).get(n); }
    // Token comes from the URL fragment (#token=…) so the data stays gated.
    var token=(location.hash.match(/token=([^&]+)/)||[])[1]||'';
    var pid=qp('project_id'), q=pid?('?project_id='+encodeURIComponent(pid)):'';
    var stEl=document.getElementById('status');
    function setStatus(t){ stEl.textContent=t; }

    function get(u){ return fetch(u,{headers:{'Authorization':'Bearer '+token,'X-App-Version-Code':'999999'}})
      .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); }); }

    // Coverage colour — matches the web map: <40 red, 40–70 amber, ≥70 green.
    function covColor(p){ p=+p||0; return p>=70?'#16a34a':p>=40?'#f59e0b':'#dc2626'; }
    function pctTxt(p){ return (p==null?'—':(+p).toFixed(1)+'%'); }

    // preferCanvas: draw vector layers on a 2D <canvas> (fast for thousands of
    // polygons, and no WebGL). Carto raster basemap loads as plain <img> tiles.
    var map=L.map('map',{preferCanvas:true, zoomControl:true, attributionControl:false}).setView([13.02,5.24],7);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png',
      {subdomains:'abcd', maxZoom:19}).addTo(map);

    var lgaLayer=null, wardLayer=null, settLayer=null, settLoaded=false;
    var st={lga:'…',ward:'…',sett:'off'};
    function render(){ setStatus('LGA '+st.lga+' · Ward '+st.ward+' · Settl '+st.sett); }

    function styleFor(weight, fillOpacity){
      return function(f){ var p=f.properties||{}; return {
        color:'#111827', weight:weight, opacity:0.7,
        fillColor:covColor(p.coverage_pct), fillOpacity:fillOpacity }; };
    }
    function popupFor(nameKey){
      return function(f, layer){
        var p=f.properties||{};
        var name=p[nameKey]||p.settlement_name||p.ward_name||p.lga_name||'—';
        var extra='';
        if(p.lga_name && nameKey!=='lga_name') extra='<br><span style="color:#6b7280">'+p.lga_name+(p.ward_name&&nameKey!=='ward_name'?' › '+p.ward_name:'')+'</span>';
        if(p.settlements!=null) extra+='<br><span style="color:#6b7280">'+(p.settlements_covered||0)+' / '+p.settlements+' settlements ≥70%</span>';
        layer.bindPopup('<b>'+name+'</b>'+extra+'<br>Coverage: <b style="color:'+covColor(p.coverage_pct)+'">'+pctTxt(p.coverage_pct)+'</b>');
      };
    }

    // LGA + Ward load immediately (light). Settlements load on toggle (9k polys).
    get('/api/app/geo/lgas'+q).then(function(d){
      lgaLayer=L.geoJSON(d,{style:styleFor(2,0.5), onEachFeature:popupFor('lga_name')}).addTo(map);
      st.lga=(d.features||[]).length; render();
      try{ map.fitBounds(lgaLayer.getBounds(),{padding:[20,20],maxZoom:9}); }catch(e){}
      document.getElementById('legend').style.display='flex';
    }).catch(function(e){ st.lga='ERR '+e.message; render(); });

    get('/api/app/geo/wards'+q).then(function(d){
      wardLayer=L.geoJSON(d,{style:styleFor(0.8,0.35), onEachFeature:popupFor('ward_name')}).addTo(map);
      st.ward=(d.features||[]).length; render();
    }).catch(function(e){ st.ward='ERR '+e.message; render(); });

    document.getElementById('t-lga').addEventListener('change',function(e){
      if(!lgaLayer)return; e.target.checked?lgaLayer.addTo(map):map.removeLayer(lgaLayer); });
    document.getElementById('t-ward').addEventListener('change',function(e){
      if(!wardLayer)return; e.target.checked?wardLayer.addTo(map):map.removeLayer(wardLayer); });
    document.getElementById('t-sett').addEventListener('change',function(e){
      if(!e.target.checked){ if(settLayer)map.removeLayer(settLayer); return; }
      if(settLoaded){ if(settLayer)settLayer.addTo(map); return; }
      st.sett='loading…'; render();
      get('/api/app/geo/settlements'+q).then(function(d){
        settLayer=L.geoJSON(d,{
          style:function(f){var p=f.properties||{}; return {color:'#15803d',weight:0.4,opacity:0.6,
            fillColor:(p.is_visited?'#16a34a':'#dc2626'),fillOpacity:0.5};},
          onEachFeature:popupFor('settlement_name')}).addTo(map);
        settLoaded=true; st.sett=(d.features||[]).length; render();
      }).catch(function(err){ st.sett='ERR '+err.message; render(); });
    });
  </script>
</body>
</html>
