<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <!-- Leaflet map (raster <img> tiles + Canvas2D polygons — no WebGL) ABOVE a
       DOM drill-down list. The earlier "blank map" was the WebView frame-height
       bug: a height:100% map box resolved to ~0px. Here the map has an EXPLICIT
       pixel height and the page uses natural flow, so the map gets real size and
       the list scrolls. If the map still can't paint, the list below still works. -->
  <link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#f3f4f6;font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:#111827}
    #bar{position:sticky;top:0;z-index:1200;background:#fff;border-bottom:1px solid #e5e7eb}
    #head{padding:10px 12px;display:flex;align-items:center;gap:10px}
    #back{border:0;background:#eef2ff;color:#3730a3;border-radius:8px;padding:7px 11px;font-size:14px;font-weight:600;cursor:pointer}
    #back[disabled]{visibility:hidden}
    #crumb{font-size:13px;font-weight:700;line-height:1.25;flex:1;min-width:0}
    #crumb small{display:block;font-weight:500;color:#6b7280;font-size:11px}
    #sub{padding:6px 12px;font-size:11.5px;color:#374151;border-top:1px solid #f1f3f5;display:flex;justify-content:space-between;align-items:center}
    #legend{font-size:10px;color:#6b7280}
    #legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin:0 3px 0 7px;vertical-align:-1px}
    /* EXPLICIT pixel height — never % (WebView viewport height is unreliable). */
    #map{height:300px;width:100%;background:#E8EAED}
    #list{padding:8px 10px 24px}
    .row{background:#fff;border:1px solid #eceef1;border-radius:12px;padding:11px 12px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer}
    .row:active{background:#f9fafb}
    .row.leaf{cursor:default}
    .rname{flex:1;min-width:0;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .rname small{display:block;font-weight:500;color:#6b7280;font-size:11px}
    .rright{flex:0 0 92px;text-align:right}
    .rpct{font-size:15px;font-weight:800}
    .bar{height:6px;border-radius:4px;background:#eceef1;margin-top:5px;overflow:hidden}
    .bar>i{display:block;height:100%}
    .chev{flex:0 0 auto;color:#9ca3af;font-size:18px}
    #msg{padding:20px 16px;text-align:center;color:#6b7280;font-size:13px}
    #msg.err{color:#b91c1c}
    .leaflet-popup-content{font-size:12px;margin:8px 10px;line-height:1.45}
  </style>
</head>
<body>
  <div id="bar">
    <div id="head">
      <button id="back" disabled>‹ Back</button>
      <div id="crumb">Loading… <small></small></div>
    </div>
    <div id="sub">
      <span id="subtext"></span>
      <span id="legend"><i style="background:#dc2626"></i>&lt;40<i style="background:#f59e0b"></i>40–70<i style="background:#16a34a"></i>≥70%</span>
    </div>
  </div>
  <div id="map"></div>
  <div id="list"><div id="msg">Loading coverage…</div></div>
  <script>
    function qp(n){ return new URLSearchParams(location.search).get(n); }
    var token=(location.hash.match(/token=([^&]+)/)||[])[1]||'';
    var pid=qp('project_id'), q=pid?('?project_id='+encodeURIComponent(pid)):'';
    function get(u){ return fetch(u,{headers:{'Authorization':'Bearer '+token,'X-App-Version-Code':'999999'}})
      .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); }); }
    function covColor(p){ p=+p||0; return p>=70?'#16a34a':p>=40?'#f59e0b':'#dc2626'; }
    function fnum(n){ return (n==null?'—':(+n).toFixed(1)+'%'); }
    function feats(d){ return (d&&d.features?d.features:[]); }
    function props(d){ return feats(d).map(function(f){return f.properties||{};}); }
    function avg(rows,key){ if(!rows.length)return 0; var s=0,n=0; rows.forEach(function(r){ if(r[key]!=null){s+=+r[key];n++;} }); return n?s/n:0; }

    var listEl=document.getElementById('list'), crumbEl=document.getElementById('crumb'),
        subEl=document.getElementById('subtext'), backEl=document.getElementById('back');
    var lgasFC=null, wardsFC=null, settCache={}, level='lga', curLga=null, curWard=null, mapLayer=null;

    var map=L.map('map',{preferCanvas:true, zoomControl:true, attributionControl:false}).setView([13.02,5.24],7);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png',{subdomains:'abcd',maxZoom:19}).addTo(map);
    function fixMap(){ try{ map.invalidateSize(true); }catch(e){} }
    window.addEventListener('load',function(){ setTimeout(fixMap,200); });
    setTimeout(fixMap,400); setTimeout(fixMap,1200);

    function msg(t,err){ listEl.innerHTML='<div id="msg"'+(err?' class="err"':'')+'>'+t+'</div>'; }
    function setHead(title,sub,canBack){ crumbEl.innerHTML=title+(sub?'<small>'+sub+'</small>':''); backEl.disabled=!canBack; }

    function rowEl(title,subtitle,cov,onTap){
      var r=document.createElement('div'); r.className='row'+(onTap?'':' leaf'); var c=covColor(cov);
      r.innerHTML='<div class="rname">'+title+(subtitle?'<small>'+subtitle+'</small>':'')+'</div>'+
        '<div class="rright"><div class="rpct" style="color:'+c+'">'+fnum(cov)+'</div>'+
        '<div class="bar"><i style="width:'+Math.max(0,Math.min(100,+cov||0))+'%;background:'+c+'"></i></div></div>'+
        (onTap?'<div class="chev">›</div>':'');
      if(onTap) r.addEventListener('click',onTap);
      return r;
    }

    // Draw a GeoJSON FeatureCollection on the map, coloured by coverage, with an
    // optional drill handler when a polygon is tapped. Fits the view to it.
    function drawMap(fc, covKey, onTap, weight){
      if(mapLayer){ map.removeLayer(mapLayer); mapLayer=null; }
      if(!fc || !feats(fc).length) return;
      mapLayer=L.geoJSON(fc,{
        style:function(f){ var p=f.properties||{}; var v=(covKey==='_cov'?p._cov:p[covKey]);
          return {color:'#111827',weight:weight,opacity:0.7,fillColor:covColor(v),fillOpacity:0.55}; },
        onEachFeature:function(f,layer){ var p=f.properties||{};
          var v=(covKey==='_cov'?p._cov:p[covKey]);
          var nm=p.settlement_name||p.ward_name||p.lga_name||'—';
          layer.bindPopup('<b>'+nm+'</b><br>Coverage: <b style="color:'+covColor(v)+'">'+fnum(v)+'</b>');
          if(onTap) layer.on('click',function(){ onTap(p); }); }
      }).addTo(map);
      try{ map.fitBounds(mapLayer.getBounds(),{padding:[12,12],maxZoom:13}); }catch(e){}
      fixMap();
    }

    function renderLgas(){
      level='lga'; curLga=null; curWard=null;
      var rows=props(lgasFC).slice().sort(function(a,b){return (b.coverage_pct||0)-(a.coverage_pct||0);});
      setHead('LGA coverage',(pid?'Project '+pid:'Active campaign'),false);
      subEl.textContent=rows.length+' LGAs · avg '+avg(rows,'coverage_pct').toFixed(1)+'%';
      drawMap(lgasFC,'coverage_pct',function(p){ openLga(p); },2);
      listEl.innerHTML=''; window.scrollTo(0,0);
      rows.forEach(function(p){ listEl.appendChild(rowEl(p.lga_name||p.lgacode||'—',null,p.coverage_pct,function(){ openLga(p); })); });
    }

    function openLga(p){
      curLga=p; level='ward';
      var fc={type:'FeatureCollection',features:feats(wardsFC).filter(function(f){return (f.properties.lga_name||'')===(p.lga_name||'');})};
      var rows=props(fc).sort(function(a,b){return (b.coverage_pct||0)-(a.coverage_pct||0);});
      setHead(p.lga_name||'LGA','Wards · LGA '+fnum(p.coverage_pct),true);
      subEl.textContent=rows.length+' wards · avg '+avg(rows,'coverage_pct').toFixed(1)+'%';
      drawMap(fc,'coverage_pct',function(wp){ openWard(wp); },1.2);
      listEl.innerHTML=''; window.scrollTo(0,0);
      if(!rows.length){ msg('No wards found for this LGA.'); return; }
      rows.forEach(function(w){ listEl.appendChild(rowEl(w.ward_name||w.wardcode||'—',
        (w.settlements_covered||0)+' / '+(w.settlements||0)+' settlements ≥70%',w.coverage_pct,function(){ openWard(w); })); });
    }

    function openWard(w){
      curWard=w; level='settlement';
      setHead(w.ward_name||'Ward',(curLga&&curLga.lga_name?curLga.lga_name+' · ':'')+'Settlements',true);
      var code=curLga&&curLga.lgacode;
      msg('Loading settlements…'); window.scrollTo(0,0);
      var done=function(all){
        var fc={type:'FeatureCollection',features:feats(all)
          .filter(function(f){return (f.properties.ward_name||'')===(w.ward_name||'');})
          .map(function(f){ var p=f.properties; p._cov=(p.completeness_pct!=null?p.completeness_pct:(p.is_visited?100:0)); return f; })};
        var rows=props(fc).sort(function(a,b){return b._cov-a._cov;});
        subEl.textContent=rows.length+' settlements · avg '+avg(rows,'_cov').toFixed(1)+'%';
        drawMap(fc,'_cov',null,0.6);
        listEl.innerHTML='';
        if(!rows.length){ msg('No settlements found for this ward.'); return; }
        rows.forEach(function(s){ listEl.appendChild(rowEl(s.settlement_name||'—',(s.is_visited?'Visited':'Not visited'),s._cov,null)); });
      };
      if(settCache[code]){ done(settCache[code]); return; }
      get('/api/app/geo/settlements?lgacode='+encodeURIComponent(code)+(pid?'&project_id='+encodeURIComponent(pid):''))
        .then(function(d){ settCache[code]=d; done(d); })
        .catch(function(e){ msg('Could not load settlements: '+e.message,true); });
    }

    backEl.addEventListener('click',function(){ if(level==='settlement'){ openLga(curLga); } else if(level==='ward'){ renderLgas(); } });

    Promise.all([ get('/api/app/geo/lgas'+q), get('/api/app/geo/wards'+q) ])
      .then(function(res){ lgasFC=res[0]; wardsFC=res[1]; renderLgas(); })
      .catch(function(e){ msg('Could not load coverage: '+e.message+'. Re-open the tab to retry.',true); setHead('Coverage','error',false); });
  </script>
</body>
</html>
