<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  <style>
    html,body,#map{margin:0;padding:0;height:100%;width:100%;font-family:-apple-system,sans-serif}
    #msg{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:5;background:#fff;border-radius:8px;
         padding:6px 12px;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
    #legend{position:absolute;bottom:10px;left:10px;z-index:5;background:#fff;border-radius:8px;padding:6px 10px;
            font-size:11px;box-shadow:0 2px 8px rgba(0,0,0,.2);display:flex;gap:10px;align-items:center}
    #legend i{display:inline-block;width:11px;height:11px;border-radius:2px;margin-right:3px;vertical-align:-1px}
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="msg">Loading geographic view…</div>
  <div id="legend" style="display:none">
    <span><i style="background:#dc2626"></i>Not covered</span>
    <span><i style="background:#f59e0b"></i>Partial</span>
    <span><i style="background:#16a34a"></i>≥70%</span>
  </div>
  <script>
    function qp(n){ return new URLSearchParams(location.search).get(n); }
    var pid = qp('project_id'), q = pid ? ('?project_id='+encodeURIComponent(pid)) : '';
    var msg = document.getElementById('msg');
    var EMPTY = {type:'FeatureCollection',features:[]};
    function get(url){ return fetch(url).then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); }); }

    var map = new maplibregl.Map({
      container:'map',
      style:{version:8,
        sources:{carto:{type:'raster',tiles:['https://a.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png','https://b.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png'],tileSize:256,attribution:'© OpenStreetMap © CARTO'}},
        layers:[{id:'bg',type:'background',paint:{'background-color':'#E8EAED'}},{id:'carto',type:'raster',source:'carto'}]},
      center:[8.5,10.0], zoom:5
    });

    var covColor = ['interpolate',['linear'],['get','coverage_pct'],0,'#dc2626',50,'#f59e0b',70,'#66bb6a',100,'#16a34a'];

    map.on('load', function(){
      // Sources
      map.addSource('lga',{type:'geojson',data:EMPTY});
      map.addSource('ward',{type:'geojson',data:EMPTY});
      map.addSource('sett',{type:'geojson',data:EMPTY});

      // Settlement mosaic (visited/not) — the core coverage view. From zoom 6.
      map.addLayer({id:'sett-fill',type:'fill',source:'sett',minzoom:6,paint:{
        'fill-color':['case',['get','is_visited'],'#16a34a','#dc2626'],'fill-opacity':0.55}});
      // Ward fill by coverage, fading as you zoom toward settlements.
      map.addLayer({id:'ward-fill',type:'fill',source:'ward',paint:{
        'fill-color':covColor,'fill-opacity':['interpolate',['linear'],['zoom'],7,0.45,9,0.30,11,0.0]}});
      map.addLayer({id:'ward-line',type:'line',source:'ward',paint:{'line-color':'#78350f','line-width':0.8,'line-opacity':0.7}});
      // LGA fill by coverage, dominant when zoomed out, fades by zoom 10.
      map.addLayer({id:'lga-fill',type:'fill',source:'lga',paint:{
        'fill-color':covColor,'fill-opacity':['interpolate',['linear'],['zoom'],6,0.5,8,0.35,10,0.0]}});
      map.addLayer({id:'lga-line',type:'line',source:'lga',paint:{'line-color':'#1a1a1a','line-width':1.8,'line-opacity':0.85}});

      // Load LGA first (fit bounds), then ward, then the heavier settlement mosaic.
      get('/api/mda/geo/lgas-coverage'+q).then(function(d){
        map.getSource('lga').setData(d);
        var b=new maplibregl.LngLatBounds(); function ext(c){if(typeof c[0]==='number')b.extend(c);else c.forEach(ext);}
        (d.features||[]).forEach(function(f){ if(f.geometry) ext(f.geometry.coordinates); });
        if(!b.isEmpty()) map.fitBounds(b,{padding:24,maxZoom:11,duration:0});
        document.getElementById('legend').style.display='flex';
        msg.style.display='none';
      }).catch(function(e){ msg.textContent='Couldn’t load LGAs · '+e.message; });

      get('/api/mda/geo/wards-coverage'+q).then(function(d){ map.getSource('ward').setData(d); }).catch(function(){});
      get('/api/mda/geo/settlements-coverage'+q).then(function(d){ map.getSource('sett').setData(d); }).catch(function(){});
    });
  </script>
</body>
</html>
