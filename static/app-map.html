<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  <style>
    html,body,#map{margin:0;padding:0;height:100%;width:100%;font-family:-apple-system,sans-serif}
    .pill{position:absolute;z-index:5;background:#fff;border-radius:8px;padding:5px 10px;font-size:11px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
    #status{top:8px;left:50%;transform:translateX(-50%);max-width:92%}
    #legend{bottom:8px;left:8px;display:flex;gap:9px;align-items:center}
    #legend i{display:inline-block;width:11px;height:11px;border-radius:2px;margin-right:3px;vertical-align:-1px}
    #toggles{top:8px;right:8px;display:flex;flex-direction:column;gap:3px}
    #toggles label{font-size:11px;display:block}
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="status" class="pill">Loading…</div>
  <div id="toggles" class="pill">
    <label><input type="checkbox" id="t-lga" checked> LGA</label>
    <label><input type="checkbox" id="t-ward" checked> Ward</label>
    <label><input type="checkbox" id="t-sett"> Settlement</label>
  </div>
  <div id="legend" class="pill" style="display:none">
    <span><i style="background:#dc2626"></i>Not covered</span>
    <span><i style="background:#f59e0b"></i>Partial</span>
    <span><i style="background:#16a34a"></i>≥70%</span>
  </div>
  <script>
    function qp(n){ return new URLSearchParams(location.search).get(n); }
    // Token comes from the URL fragment (#token=…) so the data stays gated —
    // the page itself is public HTML but carries no data without a valid token.
    var token=(location.hash.match(/token=([^&]+)/)||[])[1]||'';
    var pid=qp('project_id'), q=pid?('?project_id='+encodeURIComponent(pid)):'';
    var st=state={lga:'…',ward:'…',sett:'off'};
    var stEl=document.getElementById('status');
    function setStatus(){ stEl.textContent='LGA '+st.lga+' · Ward '+st.ward+' · Settl '+st.sett; }
    function get(u){ return fetch(u,{headers:{'Authorization':'Bearer '+token,'X-App-Version-Code':'999999'}})
      .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); }); }
    var covColor=['interpolate',['linear'],['to-number',['get','coverage_pct'],0],0,'#dc2626',40,'#f59e0b',70,'#66bb6a',100,'#16a34a'];

    var map=new maplibregl.Map({container:'map',
      style:{version:8,
        sources:{carto:{type:'raster',tiles:['https://a.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png','https://b.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png'],tileSize:256,attribution:'© OpenStreetMap © CARTO'}},
        layers:[{id:'bg',type:'background',paint:{'background-color':'#E8EAED'}},{id:'carto',type:'raster',source:'carto'}]},
      center:[8.5,10.0],zoom:5});

    var settLoaded=false;
    map.on('load',function(){
      ['lga','ward','sett'].forEach(function(s){ map.addSource(s,{type:'geojson',data:{type:'FeatureCollection',features:[]}}); });
      map.addLayer({id:'sett-fill',type:'fill',source:'sett',layout:{visibility:'none'},paint:{'fill-color':['case',['get','is_visited'],'#16a34a','#dc2626'],'fill-opacity':0.5}});
      map.addLayer({id:'ward-fill',type:'fill',source:'ward',paint:{'fill-color':covColor,'fill-opacity':0.35}});
      map.addLayer({id:'ward-line',type:'line',source:'ward',paint:{'line-color':'#78350f','line-width':0.8,'line-opacity':0.8}});
      map.addLayer({id:'lga-fill',type:'fill',source:'lga',paint:{'fill-color':covColor,'fill-opacity':0.45}});
      map.addLayer({id:'lga-line',type:'line',source:'lga',paint:{'line-color':'#111827','line-width':2,'line-opacity':0.9}});

      document.getElementById('t-lga').addEventListener('change',function(e){ ['lga-fill','lga-line'].forEach(function(L){map.setLayoutProperty(L,'visibility',e.target.checked?'visible':'none');}); });
      document.getElementById('t-ward').addEventListener('change',function(e){ ['ward-fill','ward-line'].forEach(function(L){map.setLayoutProperty(L,'visibility',e.target.checked?'visible':'none');}); });
      document.getElementById('t-sett').addEventListener('change',function(e){
        if(e.target.checked){
          map.setLayoutProperty('sett-fill','visibility','visible');
          if(!settLoaded){ st.sett='loading…'; setStatus();
            get('/api/app/geo/settlements'+q).then(function(d){ map.getSource('sett').setData(d); settLoaded=true; st.sett=(d.features||[]).length; setStatus(); })
              .catch(function(err){ st.sett='ERR '+err.message; setStatus(); }); }
        } else { map.setLayoutProperty('sett-fill','visibility','none'); }
      });

      // Default load: LGA + ward (light, fast). Settlements load on toggle.
      get('/api/app/geo/lgas'+q).then(function(d){
        map.getSource('lga').setData(d); st.lga=(d.features||[]).length; setStatus();
        var b=new maplibregl.LngLatBounds(); function ext(c){if(typeof c[0]==='number')b.extend(c);else c.forEach(ext);}
        (d.features||[]).forEach(function(f){ if(f.geometry) ext(f.geometry.coordinates); });
        if(!b.isEmpty()) map.fitBounds(b,{padding:20,maxZoom:9,duration:0});
        document.getElementById('legend').style.display='flex';
      }).catch(function(e){ st.lga='ERR '+e.message; setStatus(); });
      get('/api/app/geo/wards'+q).then(function(d){ map.getSource('ward').setData(d); st.ward=(d.features||[]).length; setStatus(); })
        .catch(function(e){ st.ward='ERR '+e.message; setStatus(); });
    });
    map.on('error',function(e){ stEl.textContent='Map error: '+(e&&e.error&&e.error.message||'unknown'); });
  </script>
</body>
</html>
