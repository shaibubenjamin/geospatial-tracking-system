<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#E8EAED;font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:#111827}
    /* Full-screen map. Height is set in JS to window.innerHeight (the WebView's
       CSS % height is unreliable), so the map always fills the tab. */
    #map{width:100%;height:100vh}
    .pill{position:absolute;z-index:1000;background:rgba(255,255,255,.95);border-radius:10px;
          padding:7px 11px;box-shadow:0 2px 10px rgba(0,0,0,.18)}
    #legend{top:8px;right:8px;font-size:10px;color:#374151;display:flex;align-items:center;flex-wrap:wrap;gap:2px;max-width:60%;justify-content:flex-end}
    #legend i{display:inline-block;width:11px;height:11px;border-radius:2px;margin:0 3px 0 8px;vertical-align:-1px}
    #legend .dot{width:9px;height:9px;border-radius:50%;border:1px solid #fff}
    #err{top:50%;left:8px;right:8px;transform:translateY(-50%);text-align:center;color:#b91c1c;display:none}
    /* ── LGA → ward → settlement explorer: a draggable BOTTOM sheet. Its top &
       height are set in JS from window.innerHeight (the same reliable value the
       map uses) — CSS bottom:0 is NOT reliable in this WebView. Drag/tap the
       handle to bring it up or collapse it; tap a settlement to collapse and see
       the map. ── */
    #drill{position:absolute;left:0;right:0;z-index:1200;background:#fff;
      border-radius:16px 16px 0 0;box-shadow:0 -3px 16px rgba(0,0,0,.22);
      display:flex;flex-direction:column;overflow:hidden;transition:top .22s ease,height .22s ease}
    #drill-head{display:flex;flex-direction:column;padding:7px 13px 9px;cursor:pointer;user-select:none;flex-shrink:0;touch-action:none}
    #drill-grip{width:40px;height:4px;border-radius:3px;background:#cbd5e1;margin:0 auto 7px}
    #drill-bar{display:flex;align-items:center;gap:8px;width:100%}
    #drill-crumb{flex:1;font-size:12.5px;font-weight:700;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    #drill-chev{font-size:13px;color:#6b7280;transition:transform .2s}
    #drill.open #drill-chev{transform:rotate(180deg)}
    #drill-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;border-top:1px solid #eef0f3}
    .drill-row{display:flex;align-items:center;gap:10px;padding:10px 13px;cursor:pointer;border-bottom:1px solid #f4f5f7}
    .drill-row:active{background:#eef2f7}
    .drill-row .nm{flex:1;font-size:13px;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .drill-row .pc{font-size:12px;font-weight:700;min-width:36px;text-align:right}
    .drill-row .ch{color:#9ca3af;font-size:15px}
    .drill-back{display:flex;align-items:center;padding:9px 13px;color:#2563eb;font-size:12.5px;font-weight:700;cursor:pointer}
    .drill-back:active{background:#eef2f7}
    /* ── Area name labels (LGA at the state view, ward as you drill in). White
       halo so they read over any fill; no tooltip box/arrow. ── */
    .maplbl{background:none!important;border:none!important;box-shadow:none!important;padding:0!important;
      color:#1f2937;font-weight:700;white-space:nowrap;
      text-shadow:0 0 3px #fff,0 0 3px #fff,0 0 2px #fff,0 1px 2px #fff}
    .maplbl.maplbl-lga{font-size:11px}
    .maplbl.maplbl-ward{font-size:10px;color:#374151;font-weight:600}
    .leaflet-tooltip.maplbl::before{display:none!important;border:none!important}
    /* Once ward labels are on (zoomed in), drop the LGA labels to declutter. */
    .leaflet-container.lbl-ward .maplbl-lga{display:none}
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="legend" class="pill">
    <span id="lg-area"><i style="background:#dc2626"></i>&lt;40<i style="background:#f59e0b"></i>40–70<i style="background:#16a34a"></i>≥70% visited</span>
    <span id="lg-pts" style="display:none"><i class="dot" style="background:#16a34a"></i>in&nbsp;<i class="dot" style="background:#dc2626"></i>out</span>
  </div>
  <div id="err" class="pill"></div>
  <div id="drill">
    <div id="drill-head">
      <div id="drill-grip"></div>
      <div id="drill-bar"><span id="drill-crumb">Explore coverage</span><span id="drill-chev">&#9650;</span></div>
    </div>
    <div id="drill-list"></div>
  </div>
  <script>
    function qp(n){ return new URLSearchParams(location.search).get(n); }
    var token=(location.hash.match(/token=([^&]+)/)||[])[1]||'';
    var pid=qp('project_id'), q=pid?('?project_id='+encodeURIComponent(pid)):'';
    function get(u){ return fetch(u,{headers:{'Authorization':'Bearer '+token,'X-App-Version-Code':'999999'}})
      .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); }); }
    function visColor(p){ p=+p||0; return p>=70?'#16a34a':p>=40?'#f59e0b':'#dc2626'; }
    function fpct(n){ return (n==null?'—':(+n).toFixed(0)+'%'); }
    function feats(d){ return (d&&d.features?d.features:[]); }
    function err(m){ var e=document.getElementById('err'); e.textContent=m; e.style.display='block'; }

    // Zoom thresholds: wards appear @9, settlements @12, GPS points @14.
    var WARD_Z=9, SETT_Z=12, PT_Z=14;

    // Size the map to the viewport (explicit px — WebView % height is unreliable).
    function sizeMap(){ var h=window.innerHeight||document.documentElement.clientHeight||600;
      document.getElementById('map').style.height=h+'px'; if(window._map) _map.invalidateSize();
      if(typeof placeDrill==='function') placeDrill(); }
    sizeMap(); window.addEventListener('resize',sizeMap);

    var map=L.map('map',{preferCanvas:true,zoomControl:true,attributionControl:false,
      minZoom:6,maxZoom:18}).setView([13.02,5.24],7);
    window._map=map;
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png',{subdomains:'abcd',maxZoom:19}).addTo(map);
    setTimeout(sizeMap,300); setTimeout(sizeMap,1000);

    var lgaLayer=null, wardLayer=null, settLayer=null, pointsLayer=null;
    var lgaItems=[];                 // {lgacode, bounds}
    var loadedSett={}, loadedPts={}; // lgacode → true (lazy-load guards)

    function boundsOf(feature){
      var minLat=90,minLon=180,maxLat=-90,maxLon=-180;
      (function walk(c){ if(typeof c[0]==='number'){ var lon=c[0],lat=c[1];
        if(lat<minLat)minLat=lat; if(lat>maxLat)maxLat=lat; if(lon<minLon)minLon=lon; if(lon>maxLon)maxLon=lon;
      } else c.forEach(walk); })(feature.geometry.coordinates);
      return L.latLngBounds([[minLat,minLon],[maxLat,maxLon]]);
    }

    function lgaStyle(f){ var p=f.properties||{};
      // LGAs not part of this campaign (no settlement plan) are shown blank —
      // a faint neutral fill + dashed border — never graded red for "0%".
      if(p.in_campaign===false) return {color:'#94a3b8',weight:1,opacity:0.6,
        dashArray:'4 3',fillColor:'#cbd5e1',fillOpacity:0.12};
      return {color:'#1f2937',weight:1.5,opacity:0.85,
        fillColor:visColor(p.visitation_pct),fillOpacity:0.55}; }
    function wardStyle(f){ return {color:'#374151',weight:0.8,opacity:0.7,
      fillColor:visColor((f.properties||{}).visitation_pct),fillOpacity:0.45}; }
    function settStyle(f){ var v=(f.properties||{}).is_visited;
      return {color:'#ffffff',weight:0.4,opacity:0.5,fillColor:v?'#16a34a':'#dc2626',fillOpacity:0.6}; }

    function popupArea(kind){ return function(f,layer){ var p=f.properties||{};
      var nm=p.ward_name||p.lga_name||'—';
      if(p.in_campaign===false){ layer.bindPopup('<b>'+nm+'</b><br><i>Not part of this campaign</i>'); return; }
      layer.bindPopup('<b>'+nm+'</b><br>'+kind+': <b style="color:'+visColor(p.visitation_pct)+'">'+fpct(p.visitation_pct)+' visited</b>'); }; }

    // Popup (on tap) + a permanent name label centered on each area.
    function onArea(kind, cls, key){ return function(f,layer){
      popupArea(kind)(f,layer);
      var nm=(f.properties||{})[key];
      if(nm) layer.bindTooltip(String(nm),{permanent:true,direction:'center',className:'maplbl '+cls,interactive:false});
    }; }

    // ── progressive reveal by zoom ───────────────────────────────────────────
    function update(){
      if(!lgaLayer) return;
      var z=map.getZoom(), b=map.getBounds();
      // Show LGA names at the state view; swap to ward names once zoomed in.
      map.getContainer().classList.toggle('lbl-ward', z>=WARD_Z);

      // LGA fill fades as we zoom in; borders stay.
      lgaLayer.setStyle({fillOpacity: z<WARD_Z?0.55 : z<SETT_Z?0.12 : 0.0, opacity: z<SETT_Z?0.85:0.5});

      // Wards appear at WARD_Z.
      if(z>=WARD_Z){ if(!map.hasLayer(wardLayer)) wardLayer.addTo(map);
        wardLayer.setStyle({fillOpacity: z<SETT_Z?0.45 : 0.1, opacity:0.7}); }
      else if(map.hasLayer(wardLayer)) map.removeLayer(wardLayer);

      // Settlements appear at SETT_Z — lazy-load for each LGA in view.
      if(z>=SETT_Z){ if(!map.hasLayer(settLayer)) settLayer.addTo(map);
        lgaItems.forEach(function(it){
          if(!loadedSett[it.lgacode] && it.bounds.intersects(b)){
            loadedSett[it.lgacode]=true;
            get('/api/app/geo/settlements?lgacode='+encodeURIComponent(it.lgacode)+(pid?'&project_id='+pid:''))
              .then(function(d){ settLayer.addData(d); }).catch(function(){});
          }
        });
      } else if(map.hasLayer(settLayer)) map.removeLayer(settLayer);

      // GPS points appear at PT_Z — lazy-load per LGA in view.
      if(z>=PT_Z){ if(!map.hasLayer(pointsLayer)) pointsLayer.addTo(map); pointsLayer.bringToFront();
        lgaItems.forEach(function(it){
          if(!loadedPts[it.lgacode] && it.bounds.intersects(b)){
            loadedPts[it.lgacode]=true;
            get('/api/app/geo/points?lgacode='+encodeURIComponent(it.lgacode)+(pid?'&project_id='+pid:'')+'&limit=4000')
              .then(function(d){ pointsLayer.addData(d); }).catch(function(){});
          }
        });
      } else if(map.hasLayer(pointsLayer)) map.removeLayer(pointsLayer);

      // Legend: reveal the in/out GPS-dot key once points can appear.
      var lp=document.getElementById('lg-pts'); if(lp) lp.style.display = z>=SETT_Z?'inline':'none';
    }

    // ── Draggable LGA → ward → settlement explorer (bottom sheet) ────────────
    // Tapping a row flies the map to that area (and reveals the next level via
    // the zoom thresholds above). Tapping a settlement (leaf) collapses the
    // sheet so the map is fully visible. Drag/tap the handle to open/collapse.
    var _lgasFC=null, _wardsFC=null, _settCache={};
    var drill={level:0, lga:null, ward:null};
    var drillOpen=false;
    // Position the sheet from the TOP using window.innerHeight (reliable here),
    // not CSS bottom:0 (which this WebView gets wrong).
    function placeDrill(){ var el=document.getElementById('drill'); if(!el) return;
      var h=window.innerHeight||document.documentElement.clientHeight||600;
      var sh = drillOpen ? Math.min(Math.round(h*0.52), 460) : 56;
      el.style.height=sh+'px'; el.style.top=(h-sh)+'px'; }
    function setDrillOpen(o){ drillOpen=!!o; var el=document.getElementById('drill');
      if(el) el.classList.toggle('open',drillOpen); placeDrill(); }
    function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }
    function byProp(k){ return function(a,b){ return String((a.properties||{})[k]||'').localeCompare(String((b.properties||{})[k]||'')); }; }
    function fitFeat(f){ try{ map.fitBounds(boundsOf(f),{padding:[22,22],maxZoom: drill.level>=2?15:(drill.level===1?13:11)}); }catch(e){} }
    function drillRow(name,pct,drillable,onclick){
      var row=document.createElement('div'); row.className='drill-row';
      row.innerHTML='<span class="nm">'+esc(name||'—')+'</span>'+
        '<span class="pc" style="color:'+(pct==null?'#9ca3af':visColor(pct))+'">'+fpct(pct)+'</span>'+
        (drillable?'<span class="ch">&#8250;</span>':'');
      row.onclick=onclick; return row;
    }
    function drillBack(onclick){ var d=document.createElement('div'); d.className='drill-back'; d.innerHTML='&#8249;&nbsp;Back'; d.onclick=onclick; return d; }
    function drillMsg(t){ var d=document.createElement('div'); d.className='drill-row'; d.innerHTML='<span class="nm" style="color:#9ca3af">'+esc(t)+'</span>'; return d; }
    function renderDrill(){
      var crumb=document.getElementById('drill-crumb'), list=document.getElementById('drill-list');
      if(!crumb||!list) return; list.innerHTML='';
      if(drill.level===0){
        crumb.textContent='All LGAs · tap to drill in';
        feats(_lgasFC).slice().sort(byProp('lga_name')).forEach(function(f){ var p=f.properties||{};
          list.appendChild(drillRow(p.lga_name, p.in_campaign===false?null:p.visitation_pct, true, function(){
            drill.lga=f; drill.ward=null; drill.level=1; fitFeat(f); renderDrill(); })); });
      } else if(drill.level===1){
        var lp=drill.lga.properties||{};
        crumb.textContent=(lp.lga_name||'LGA')+' › wards';
        list.appendChild(drillBack(function(){ drill.level=0; drill.lga=null; renderDrill(); }));
        var ln=String(lp.lga_name||'').toLowerCase();
        var wards=feats(_wardsFC).filter(function(w){return String((w.properties||{}).lga_name||'').toLowerCase()===ln;}).sort(byProp('ward_name'));
        if(!wards.length) list.appendChild(drillMsg('No ward boundaries for this LGA'));
        wards.forEach(function(f){ var p=f.properties||{};
          list.appendChild(drillRow(p.ward_name, p.visitation_pct, true, function(){
            drill.ward=f; drill.level=2; fitFeat(f); loadSettlements(); renderDrill(); })); });
      } else {
        var wp=drill.ward.properties||{};
        crumb.textContent=(wp.ward_name||'Ward')+' › settlements';
        list.appendChild(drillBack(function(){ drill.level=1; drill.ward=null; renderDrill(); }));
        var code=(drill.lga.properties||{}).lgacode, data=_settCache[code];
        if(!data){ list.appendChild(drillMsg('Loading settlements…')); return; }
        var wn=String(wp.ward_name||'').toLowerCase();
        var setts=data.filter(function(s){return String((s.properties||{}).ward_name||'').toLowerCase()===wn;})
          .sort(function(a,b){return ((b.properties||{}).completeness_pct||0)-((a.properties||{}).completeness_pct||0);});
        if(!setts.length) list.appendChild(drillMsg('No settlements for this ward'));
        setts.forEach(function(f){ var p=f.properties||{};
          list.appendChild(drillRow(p.settlement_name, p.completeness_pct, false, function(){
            fitFeat(f); setDrillOpen(false); })); });
      }
    }
    function loadSettlements(){
      var code=(drill.lga.properties||{}).lgacode;
      if(_settCache[code]){ renderDrill(); return; }
      get('/api/app/geo/settlements?lgacode='+encodeURIComponent(code)+(pid?'&project_id='+pid:''))
        .then(function(d){ _settCache[code]=feats(d); if(drill.level===2) renderDrill(); })
        .catch(function(){ _settCache[code]=[]; if(drill.level===2) renderDrill(); });
    }

    Promise.all([ get('/api/app/geo/lgas'+q), get('/api/app/geo/wards'+q) ]).then(function(res){
      var lgasFC=res[0], wardsFC=res[1];
      lgaLayer=L.geoJSON(lgasFC,{style:lgaStyle,onEachFeature:onArea('Visitation','maplbl-lga','lga_name')}).addTo(map);
      wardLayer=L.geoJSON(wardsFC,{style:wardStyle,onEachFeature:onArea('Visitation','maplbl-ward','ward_name')});
      settLayer=L.geoJSON(null,{style:settStyle,onEachFeature:function(f,l){ var p=f.properties||{};
        l.bindPopup('<b>'+(p.settlement_name||'—')+'</b><br>'+(p.is_visited?'Visited':'Not visited')); }});
      pointsLayer=L.geoJSON(null,{pointToLayer:function(f,ll){ var ib=(f.properties||{}).in_bounds;
        return L.circleMarker(ll,{radius:3,fillColor:ib?'#16a34a':'#dc2626',color:'#fff',weight:0.6,fillOpacity:0.9}); }});
      feats(lgasFC).forEach(function(f){ if(f.geometry){ var p=f.properties||{}; lgaItems.push({lgacode:p.lgacode,name:(p.lga_name||p.lga||''),bounds:boundsOf(f)}); } });
      // ?focus=<lgacode OR lga name> (from the app's Coverage tab "View on map")
      // → zoom to that LGA so its wards reveal; otherwise fit the whole state.
      // The app passes the LGA name (it has no code), so match either.
      var focus=qp('focus'), fl=focus?String(focus).trim().toLowerCase():'';
      var fit=focus&&lgaItems.filter(function(x){return x.lgacode===focus || (x.name||'').trim().toLowerCase()===fl;})[0];
      try{ if(fit){ map.fitBounds(fit.bounds,{padding:[24,24],maxZoom:11}); } else { map.fitBounds(lgaLayer.getBounds(),{padding:[16,16],maxZoom:8}); } }catch(e){}
      sizeMap(); update();
      map.on('zoomend moveend', update);

      // Wire the drill explorer now that the data is in.
      _lgasFC=lgasFC; _wardsFC=wardsFC;
      // Handle: tap toggles; a vertical swipe opens (up) / collapses (down).
      var dh=document.getElementById('drill-head');
      if(dh){
        var ty=null, swiped=false, lastTouch=0;
        dh.addEventListener('touchstart',function(e){ ty=e.touches[0].clientY; swiped=false; },{passive:true});
        dh.addEventListener('touchmove',function(e){ if(ty!=null && Math.abs(e.touches[0].clientY-ty)>10) swiped=true; },{passive:true});
        dh.addEventListener('touchend',function(e){ if(ty==null) return;
          var dy=((((e.changedTouches||[])[0])||{}).clientY||ty)-ty; ty=null; lastTouch=Date.now();
          if(swiped) setDrillOpen(dy<0); else setDrillOpen(!drillOpen); });
        dh.addEventListener('click',function(){ if(Date.now()-lastTouch<500) return; setDrillOpen(!drillOpen); });
      }
      // Arrived with a focused LGA? pre-set the explorer at that LGA's wards.
      if(fit){
        var match=feats(lgasFC).filter(function(f){var p=f.properties||{};
          return p.lgacode===fit.lgacode || String(p.lga_name||'').trim().toLowerCase()===(fit.name||'').trim().toLowerCase();})[0];
        if(match){ drill.lga=match; drill.level=1; }
      }
      renderDrill(); placeDrill();
    }).catch(function(e){ err('Could not load coverage: '+e.message+'. Re-open the tab to retry.'); });
  </script>
</body>
</html>
