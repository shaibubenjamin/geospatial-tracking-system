<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ERITAS MDA Coverage · App Preview</title>
  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif}
    body{background:#1f2933;display:flex;justify-content:center;padding:16px;min-height:100vh}
    .note{position:fixed;top:8px;left:8px;font-size:11px;color:#9aa5b1}
    .phone{width:100%;max-width:412px;height:860px;background:#0f1419;border-radius:28px;overflow:hidden;
           display:flex;flex-direction:column;box-shadow:0 12px 40px rgba(0,0,0,.5);color:#e8eaed}
    .bar{background:#11161c;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #222;gap:8px}
    .bar .title{font-weight:700;font-size:15px;white-space:nowrap}
    .bar select{background:#11161c;color:#e8eaed;border:1px solid #2b3540;border-radius:8px;padding:5px 8px;font-size:12px;max-width:170px}
    .body{flex:1;overflow-y:auto;padding:12px}
    .nav{display:flex;background:#11161c;border-top:1px solid #222}
    .nav button{flex:1;background:none;border:0;color:#8a94a0;padding:9px 2px;font-size:10px;cursor:pointer}
    .nav button.active{color:#16A34A;font-weight:700}
    .nav .ic{display:block;font-size:17px;margin-bottom:2px}
    .hero{background:#16A34A;border-radius:16px;padding:18px;margin-bottom:12px;color:#fff}
    .hero .pct{font-size:40px;font-weight:800;line-height:1}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .card{background:#1b232c;border-radius:14px;padding:14px}
    .card .v{font-size:22px;font-weight:800;color:#16A34A}
    .card .l{font-size:12px;color:#9aa5b1}
    .row{background:#1b232c;border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer}
    .row .top{display:flex;justify-content:space-between;font-weight:600}
    .barpct{height:7px;border-radius:4px;background:#2b3540;margin-top:6px;overflow:hidden}
    .barpct>i{display:block;height:100%}
    .login{padding:24px}
    .login input{width:100%;padding:12px;margin:6px 0;border-radius:10px;border:1px solid #2b3540;background:#11161c;color:#fff}
    .login button,.bigbtn{width:100%;padding:12px;margin-top:8px;border:0;border-radius:10px;background:#16A34A;color:#fff;font-weight:700;cursor:pointer}
    #map{width:100%;height:100%}
    .gstats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
    .err{color:#f87171;font-size:13px;padding:8px}
    .muted{color:#9aa5b1;font-size:13px;padding:8px}
    .back{background:none;border:0;color:#16A34A;font-size:14px;cursor:pointer;margin-bottom:8px}
    .areacard{border-radius:16px;padding:18px;margin-bottom:12px;color:#fff}
  </style>
</head>
<body>
  <div class="note">App preview (browser mirror) · uses /api/app/* · not the APK</div>
  <div class="phone">
    <div class="bar"><span class="title">ERITAS MDA</span><select id="projSel" onchange="onProj()"></select></div>
    <div class="body" id="body"></div>
    <div class="nav" id="nav" style="display:none">
      <button data-t="dash" class="active"><span class="ic">▦</span>Dashboard</button>
      <button data-t="cov"><span class="ic">▥</span>Coverage</button>
      <button data-t="map"><span class="ic">◔</span>Map</button>
      <button data-t="area"><span class="ic">◎</span>My Area</button>
    </div>
  </div>
  <script>
    const VC = 999999;
    let token = sessionStorage.getItem('preview_token');
    let pid = null, tab = 'dash', projects = [];

    async function api(path){
      const r = await fetch(path, {headers:{'Authorization':'Bearer '+token,'X-App-Version-Code':VC}});
      if(!r.ok) throw new Error('HTTP '+r.status);
      return r.json();
    }
    const color = p => p>=70?'#2E7D32':p>=40?'#F9A825':'#C62828';
    const k = n => n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'k':(''+n);

    function loginView(msg){
      document.getElementById('nav').style.display='none';
      document.getElementById('projSel').innerHTML='';
      document.getElementById('body').innerHTML =
        `<div class="login"><h3 style="margin-bottom:12px">Sign in</h3>
         ${msg?`<div class="err">${msg}</div>`:''}
         <input id="u" placeholder="Username"><input id="p" type="password" placeholder="Password">
         <button onclick="doLogin()">Sign in</button></div>`;
    }
    async function doLogin(){
      const u=document.getElementById('u').value, p=document.getElementById('p').value;
      try{
        const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
        if(!r.ok){loginView('Sign-in failed');return;}
        token=(await r.json()).access_token; sessionStorage.setItem('preview_token',token); start();
      }catch(e){loginView('Network error');}
    }
    async function start(){
      document.getElementById('nav').style.display='flex';
      try{ projects=await api('/api/app/projects');
        const sel=document.getElementById('projSel');
        sel.innerHTML=projects.map(p=>`<option value="${p.id}">${(p.state_name||p.name)} — R${p.round_number||''}${p.is_active?' (active)':''}</option>`).join('');
        const active=projects.find(x=>x.is_active)||projects[0]; pid=active?active.id:null;
        if(pid) sel.value=pid;
      }catch(e){ if(String(e).includes('401')){token=null;loginView('Session expired');return;} }
      render();
    }
    function onProj(){ pid=parseInt(document.getElementById('projSel').value)||null; render(); }
    document.getElementById('nav').addEventListener('click',e=>{
      const b=e.target.closest('button'); if(!b)return;
      tab=b.dataset.t; [...document.querySelectorAll('.nav button')].forEach(x=>x.classList.toggle('active',x===b)); render();
    });

    async function render(){
      const q = pid?('?project_id='+pid):'';
      if(tab==='dash'){ renderDash(q); }
      else if(tab==='cov'){ renderLgas(); }
      else if(tab==='map'){ renderMap(); }
      else if(tab==='area'){ renderArea(); }
    }
    async function renderDash(q){
      const body=document.getElementById('body'); body.innerHTML='<div class="muted">Loading…</div>';
      try{ const d=await api('/api/app/overview'+q);
        const day=d.current_campaign_day!=null?(d.current_campaign_day+(d.planned_duration_days?(' / '+d.planned_duration_days):'')):'—';
        body.innerHTML=`<div class="hero"><div style="font-size:12px;opacity:.9">Administrative coverage</div>
          <div class="pct">${Math.round(d.coverage_pct||0)}%</div></div>
          <div class="grid">
          ${[['Children treated',k(d.total_treated||0)],['Forms',k(d.total_forms||0)],['Teams active',k(d.teams_active||0)],
             ['LGAs covered',d.lgas_covered||0],['Campaign day',day],['QC flags',k(d.total_qc_flags||0)],
             ['Error rate',Math.round(d.error_rate_pct||0)+'%'],['Refusals',k(d.refusals||0)],
             ['Avg forms/team',(d.teams_active>0?Math.round(d.total_forms/d.teams_active):'—')],
             ['GPS outside LGA',k(d.gps_outside_lga||0)],['Fast forms',k(d.fast_forms||0)],
             ['Days active',d.days_active||0]]
            .map(s=>`<div class="card"><div class="v">${s[1]}</div><div class="l">${s[0]}</div></div>`).join('')}
          </div>
          <div class="card" style="margin-top:12px"><div class="l" style="margin-bottom:6px">Cumulative coverage over campaign days</div>
            <div id="trend"><div class="muted">Loading trend…</div></div></div>`;
        loadTrend(d.baseline_total||0);
      }catch(e){body.innerHTML=`<div class="err">Overview: ${e}</div>`;}
    }
    async function loadTrend(baseline){
      const el=document.getElementById('trend'); if(!el)return;
      try{ const t=await api('/api/app/trends/daily'+(pid?('?project_id='+pid):''));
        if(!t.length){el.innerHTML='<div class="muted">No daily data yet.</div>';return;}
        let cum=0; const pts=t.map(r=>{cum+=(r.treated||0);return {d:r.date,v:cum};});
        const max=baseline>0?baseline:Math.max(...pts.map(p=>p.v),1);
        const W=320,H=120,P=8,n=pts.length;
        const xs=i=>P+(n<=1?W/2:i*(W-2*P)/(n-1)), ys=v=>H-P-(v/max)*(H-2*P-14);
        let line='',area='M '+xs(0)+' '+(H-P), dots='';
        pts.forEach((p,i)=>{const x=xs(i),y=ys(p.v);line+=(i?'L':'M')+x+' '+y+' ';area+=' L '+x+' '+y;
          dots+=`<circle cx="${x}" cy="${y}" r="1.6" fill="#16A34A"/>`;});
        area+=' L '+xs(n-1)+' '+(H-P)+' Z';
        // x-axis date ticks: first, middle, last
        const idxs=[...new Set([0,Math.floor((n-1)/2),n-1])];
        let ticks=''; idxs.forEach(i=>{ const dd=(pts[i].d||'').slice(5); // MM-DD
          ticks+=`<text x="${xs(i)}" y="${H-1}" font-size="7" fill="#9aa5b1" text-anchor="${i===0?'start':i===n-1?'end':'middle'}">${dd}</text>`;});
        const last=pts[pts.length-1].v;
        const lab=baseline>0?(Math.round(100*last/max)+'% of target'):(k(last)+' treated');
        el.innerHTML=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">
          <path d="${area}" fill="#16A34A" opacity="0.18"/>
          <path d="${line}" fill="none" stroke="#16A34A" stroke-width="2" stroke-linejoin="round"/>
          ${dots}${ticks}</svg>
          <div class="l" style="margin-top:4px">${n} day(s) · ${lab}</div>`;
      }catch(e){ el.innerHTML='<div class="muted">Trend unavailable.</div>'; }
    }
    async function renderLgas(){
      const body=document.getElementById('body'); body.innerHTML='<div class="muted">Loading…</div>';
      try{ const rows=await api('/api/app/coverage/lga'+(pid?('?project_id='+pid):''));
        body.innerHTML='<div style="font-weight:700;margin-bottom:8px">Coverage by LGA · tap for wards</div>'+
          rows.map(r=>`<div class="row" onclick="openWards('${(r.lga||'').replace(/'/g,'')}')">
            <div class="top"><span>${r.lga||'—'}</span><span style="color:${color(r.coverage_pct)}">${Math.round(r.coverage_pct)}%</span></div>
            <div class="barpct"><i style="width:${Math.min(100,r.coverage_pct)}%;background:${color(r.coverage_pct)}"></i></div>
            <div class="l" style="margin-top:6px;color:#9aa5b1;font-size:12px">${k(r.actual_treated)} / ${k(r.baseline_total)} target · ${r.teams} team(s)</div></div>`).join('');
      }catch(e){body.innerHTML=`<div class="err">LGA coverage: ${e}</div>`;}
    }
    async function openWards(lga){
      const body=document.getElementById('body'); body.innerHTML='<div class="muted">Loading…</div>';
      try{ const ws=await api('/api/app/coverage/ward?lga='+encodeURIComponent(lga)+(pid?('&project_id='+pid):''));
        body.innerHTML=`<button class="back" onclick="renderLgas()">← Back to LGAs</button>
          <div style="font-weight:700;margin-bottom:8px">${lga} · wards</div>`+
          ws.map(w=>`<div class="row" style="cursor:default"><div class="top"><span>${w.ward_name||'—'}</span>
            <span style="color:${color(w.coverage_pct)}">${Math.round(w.coverage_pct)}%</span></div>
            <div class="barpct"><i style="width:${Math.min(100,w.coverage_pct)}%;background:${color(w.coverage_pct)}"></i></div></div>`).join('');
      }catch(e){body.innerHTML=`<div class="err">Wards: ${e}</div>`;}
    }
    async function renderMap(){
      const body=document.getElementById('body');
      const src='/app/map'+(pid?('?project_id='+pid):'')+'#token='+encodeURIComponent(token||'');
      body.innerHTML='<div class="gstats" id="gs"></div><div style="height:calc(100% - 70px);border-radius:12px;overflow:hidden">'+
        '<iframe src="'+src+'" style="width:100%;height:100%;border:0"></iframe></div>';
      try{ const s=await api('/api/app/geo/summary'+(pid?('?project_id='+pid):''));
        const c=s.completeness, cs=s.coverage_summary, items=[];
        if(c){items.push(['Completeness',Math.round(c.overall_completeness)+'%']);items.push(['Visited',c.visited_settlements+'/'+c.total_settlements]);}
        if(cs){if(cs.lga)items.push(['LGAs ≥70%',cs.lga.at_target+'/'+cs.lga.total]);if(cs.ward)items.push(['Wards ≥70%',cs.ward.at_target+'/'+cs.ward.total]);if(cs.settlement)items.push(['Settl. ≥70%',cs.settlement.at_target+'/'+cs.settlement.total]);}
        document.getElementById('gs').innerHTML=items.map(i=>`<div class="card"><div class="v" style="font-size:16px">${i[1]}</div><div class="l">${i[0]}</div></div>`).join('');
      }catch(e){}
    }
    function renderArea(){
      const body=document.getElementById('body');
      body.innerHTML=`<div style="font-weight:700;margin-bottom:6px">Where am I?</div>
        <div class="muted">Uses your browser location to find your settlement's coverage and the nearest place left to cover.</div>
        <button class="bigbtn" onclick="locate()">Use my location</button><div id="area"></div>`;
    }
    function locate(){
      const out=document.getElementById('area');
      if(!navigator.geolocation){out.innerHTML='<div class="err">Geolocation not available.</div>';return;}
      out.innerHTML='<div class="muted">Getting GPS…</div>';
      navigator.geolocation.getCurrentPosition(async pos=>{
        try{ const r=await api(`/api/app/near?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`+(pid?('&project_id='+pid):''));
          const cur=r.current, nx=r.nearest_uncovered;
          let h='';
          if(cur){ const bg=cur.is_covered?'#2E7D32':'#C62828';
            h+=`<div class="areacard" style="background:${bg};margin-top:12px"><div style="font-size:12px;opacity:.9">You are in</div>
              <div style="font-size:22px;font-weight:800">${cur.settlement_name||'Unknown'}</div>
              <div>${cur.ward_name||'—'} · ${cur.lga_name||'—'}</div>
              <div style="margin-top:6px;font-weight:700">${cur.is_covered?'Covered':'Not covered'} · ${Math.round(cur.completeness_pct)}%</div></div>`;
          } else { h+='<div class="card" style="margin-top:12px">Outside any mapped settlement for this campaign.</div>'; }
          if(nx){ h+=`<div class="card" style="margin-top:10px"><div class="l">Nearest settlement left to cover</div>
            <div style="font-weight:700">${nx.settlement_name||'Unknown'}</div><div class="l">${nx.ward_name||'—'} · ${Math.round(nx.distance_m)} m away · ${Math.round(nx.completeness_pct)}%</div></div>`; }
          out.innerHTML=h;
        }catch(e){ out.innerHTML=`<div class="err">Lookup failed: ${e}</div>`; }
      }, err=>{ out.innerHTML=`<div class="err">Location denied/failed: ${err.message}</div>`; }, {enableHighAccuracy:true,timeout:10000});
    }

    if(token) start(); else loginView();
  </script>
</body>
</html>
