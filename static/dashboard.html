<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geospatial Tracking System</title>
  <link rel="stylesheet" href="/static/css/styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="dash-root">

  <!-- ── Top bar ─────────────────────────────────────────────────── -->
  <header class="topbar">
    <div class="topbar-brand">
      <div class="tb-logo">🛰️</div>
      <span>GeoTracker</span>
    </div>
    <div class="topbar-sep"></div>

    <nav class="tb-breadcrumb" id="tb-breadcrumb">
      <span class="bc-seg" onclick="resetToProject()"><i class="bi bi-house-fill"></i></span>
    </nav>

    <div class="topbar-right">
      <select id="project-switcher" class="project-switcher"></select>

      <div class="qc-badge" id="qc-badge" onclick="toggleModal('qc-modal')" title="QC Flags">
        <i class="bi bi-shield-exclamation"></i>
        <span id="qc-total">0</span>&nbsp;flags
      </div>

      <a href="/admin" class="btn btn-sm btn-secondary" id="admin-link" style="display:none">
        <i class="bi bi-gear"></i> Admin
      </a>

      <div class="user-menu" onclick="handleLogout()">
        <div class="user-avatar"><i class="bi bi-person"></i></div>
        <span id="topbar-username">User</span>
        <i class="bi bi-box-arrow-right"></i>
      </div>
    </div>
  </header>

  <!-- ── Map wrapper ─────────────────────────────────────────────── -->
  <div class="map-wrap" id="map-wrap">
    <div id="map"></div>

    <!-- KPI strip (top-left) -->
    <div class="map-kpi" id="map-kpi">
      <div class="kpi-chip">
        <i class="bi bi-check-circle-fill" style="color:#22c55e"></i>
        <span id="kpi-visited">—</span>&nbsp;visited
      </div>
      <div class="kpi-chip kpi-sep">
        <i class="bi bi-grid-3x3-gap-fill" style="color:#f59e0b"></i>
        <span id="kpi-comp">—</span>%&nbsp;complete
      </div>
      <div class="kpi-chip">
        <i class="bi bi-pin-map-fill" style="color:#60a5fa"></i>
        <span id="kpi-points">—</span>&nbsp;pts
      </div>
    </div>

    <!-- Toolbar toggle tab -->
    <button class="toolbar-toggle" id="toolbar-toggle" onclick="toggleToolbar()" title="Open tools">
      <i class="bi bi-tools"></i>
    </button>

    <!-- Vertical side toolbar -->
    <div class="side-toolbar" id="side-toolbar">
      <button class="st-btn" onclick="map.zoomIn()" title="Zoom in"><i class="bi bi-plus-lg"></i></button>
      <button class="st-btn" onclick="map.zoomOut()" title="Zoom out"><i class="bi bi-dash-lg"></i></button>
      <div class="st-sep"></div>
      <button class="st-btn" id="bm-street" onclick="setBasemap('osm',this)" title="Street map"><i class="bi bi-map"></i></button>
      <button class="st-btn" id="bm-sat"    onclick="setBasemap('satellite',this)" title="Satellite"><i class="bi bi-globe2"></i></button>
      <button class="st-btn" id="bm-topo"   onclick="setBasemap('terrain',this)" title="Terrain"><i class="bi bi-mountains"></i></button>
      <div class="st-sep"></div>
      <button class="st-btn" id="st-layers" onclick="toggleLayerPanel()" title="Layers"><i class="bi bi-stack"></i></button>
      <button class="st-btn" onclick="togglePieModal('coverage')" title="Visitation chart"><i class="bi bi-pie-chart"></i></button>
      <button class="st-btn" onclick="togglePieModal('completeness')" title="Completeness chart"><i class="bi bi-bar-chart-line"></i></button>
      <div class="st-sep"></div>
      <button class="st-btn" onclick="refreshData()" title="Refresh"><i class="bi bi-arrow-clockwise"></i></button>
      <button class="st-btn" onclick="exportTableCSV()" title="Export CSV"><i class="bi bi-download"></i></button>
      <button class="st-btn" id="btn-fs" onclick="toggleFullscreen()" title="Fullscreen"><i class="bi bi-fullscreen"></i></button>
      <div class="st-sep"></div>
      <div class="st-zoom">Z&nbsp;<span id="zoom-level">7.0</span></div>
    </div>

    <!-- Layer visibility panel -->
    <div class="layer-panel hidden" id="layer-panel">
      <div class="lp-hdr">Layers</div>
      <div class="lp-row" onclick="toggleLayer('lga')">
        <span class="lp-dot" style="background:#3b82f6"></span>
        <span class="lp-name">LGA Boundaries</span>
        <i class="bi bi-eye lp-eye" id="eye-lga"></i>
      </div>
      <div class="lp-row" onclick="toggleLayer('ward')">
        <span class="lp-dot" style="background:#8b5cf6"></span>
        <span class="lp-name">Ward Boundaries</span>
        <i class="bi bi-eye lp-eye" id="eye-ward"></i>
      </div>
      <div class="lp-row" onclick="toggleLayer('settlement')">
        <span class="lp-dot" style="background:#22c55e"></span>
        <span class="lp-name">Settlements</span>
        <i class="bi bi-eye lp-eye" id="eye-settlement"></i>
      </div>
      <div class="lp-row" onclick="toggleLayer('points')">
        <span class="lp-dot" style="background:#ef4444"></span>
        <span class="lp-name">GPS Points</span>
        <i class="bi bi-eye lp-eye" id="eye-points"></i>
      </div>
      <div class="lp-legend">
        <div class="lp-legend-item"><span class="lp-legend-dot" style="background:#16a34a"></span>Visited</div>
        <div class="lp-legend-item"><span class="lp-legend-dot" style="background:#dc2626"></span>Not visited</div>
      </div>
    </div>

    <!-- Pie chart modal -->
    <div class="float-modal hidden" id="pie-modal">
      <div class="float-modal-hdr">
        <span id="pie-title" class="float-modal-title">Coverage</span>
        <button class="btn-icon" onclick="toggleModal('pie-modal')"><i class="bi bi-x"></i></button>
      </div>
      <canvas id="pie-chart" width="220" height="200"></canvas>
      <div class="float-modal-sub" id="pie-subtitle"></div>
    </div>

    <!-- QC modal -->
    <div class="float-modal hidden" id="qc-modal" style="top:56px;right:16px">
      <div class="float-modal-hdr">
        <span class="float-modal-title">QC Flags</span>
        <button class="btn-icon" onclick="toggleModal('qc-modal')"><i class="bi bi-x"></i></button>
      </div>
      <div class="qc-row"><span class="qc-lbl">Out of Bound</span><span class="qc-val red" id="qc-oob">0</span></div>
      <div class="qc-row"><span class="qc-lbl">Time Violations</span><span class="qc-val red" id="qc-tv">0</span></div>
      <div class="qc-row"><span class="qc-lbl">Stacked Points</span><span class="qc-val red" id="qc-sp">0</span></div>
      <div class="qc-row" style="border:none"><span class="qc-lbl">Total</span><span class="qc-val" id="qc-ttl">0</span></div>
    </div>
  </div>

  <!-- ── Drag handle ─────────────────────────────────────────────── -->
  <div class="drag-handle" id="drag-handle">
    <div class="drag-grip"></div>
  </div>

  <!-- ── Bottom data table ───────────────────────────────────────── -->
  <div class="bt-panel" id="bt-panel">

    <div class="bt-header">
      <!-- Level tabs -->
      <div class="bt-tabs">
        <button class="bt-tab active" data-level="lga" onclick="switchTab('lga')">
          <i class="bi bi-building"></i>&nbsp;LGA
        </button>
        <button class="bt-tab" data-level="ward" id="tab-ward" disabled onclick="switchTab('ward')">
          <i class="bi bi-map"></i>&nbsp;Ward
        </button>
        <button class="bt-tab" data-level="settlement" id="tab-sett" disabled onclick="switchTab('settlement')">
          <i class="bi bi-geo-alt"></i>&nbsp;Settlement
        </button>
      </div>

      <!-- Search -->
      <div class="bt-search-wrap">
        <i class="bi bi-search"></i>
        <input type="text" id="bt-search" placeholder="Search…" oninput="filterTable()">
      </div>

      <!-- Row count + export -->
      <div class="bt-header-right">
        <span class="bt-count" id="bt-count"></span>
        <button class="btn btn-sm btn-secondary" onclick="exportTableCSV()" title="Export CSV">
          <i class="bi bi-filetype-csv"></i>&nbsp;Export
        </button>
      </div>
    </div>

    <!-- Scrollable table -->
    <div class="bt-table-wrap">
      <table id="bt-table">
        <thead id="bt-thead"></thead>
        <tbody id="bt-tbody">
          <tr><td colspan="10" class="bt-empty">
            <i class="bi bi-database" style="font-size:20px;opacity:0.3"></i><br>
            Select a project to load data
          </td></tr>
        </tbody>
      </table>
    </div>

    <!-- Footer summary -->
    <div class="bt-footer">
      <span id="bt-summary">—</span>
    </div>

  </div>
</div><!-- .dash-root -->

<div id="toast-container"></div>
<script src="/static/js/dashboard.js"></script>
</body>
</html>
