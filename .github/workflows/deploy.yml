name: Deploy

on:
  push:
    branches: [main]
  # Manual trigger from the Actions tab for hotfix re-deploys
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (defaults to the merge commit SHA)"
        required: false
        type: string

concurrency:
  group: deploy-prod
  cancel-in-progress: false   # don't kill a half-deploy; queue instead

jobs:
  build-push-deploy:
    name: Build, push to ECR, restart EC2
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # required for OIDC into AWS

    env:
      AWS_REGION: us-east-1
      ECR_REPO: 387526361725.dkr.ecr.us-east-1.amazonaws.com/mda-dashboard
      EC2_INSTANCE_ID: i-0f57573ce98580bfc

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch full history so we can tag the image with the commit SHA
          fetch-depth: 1

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::387526361725:role/mda-dashboard-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "${ECR_REPO%/*}"

      - name: Set image tag
        id: tag
        run: |
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REPO }}:${{ steps.tag.outputs.tag }}
            ${{ env.ECR_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Roll the container on EC2 (via SSM)
        # Uses AWS Systems Manager Run Command — no SSH, no bastion, no key.
        # The EC2 instance role + SSM agent execute the script as root.
        # Polls until the command finishes, then prints stdout/stderr and
        # exits non-zero if the command failed (so the workflow surfaces
        # rollout failures).
        #
        # We also ship the latest deploy/docker-compose.prod.yml from this
        # repo to /opt/mda-dashboard/docker-compose.yml — without this,
        # `docker compose up -d` keeps using whichever compose file was on
        # disk at first deploy and silently ignores new services (e.g.
        # the sync_worker added in PR #6 never showed up on prod). We pass
        # the file as base64 inside the SSM command parameters so there's
        # no extra infra (S3 bucket, git on the host, etc.).
        run: |
          set -euo pipefail
          COMPOSE_B64=$(base64 -w0 deploy/docker-compose.prod.yml 2>/dev/null || base64 -b0 deploy/docker-compose.prod.yml)
          # Also ship the current refresh-env.sh so the host script never goes
          # stale, then run it before restart to regenerate /opt/mda-dashboard/.env
          # from Secrets Manager. Without this the .env is only updated by a manual
          # run, so a rotated/added secret (e.g. SYNC_ENCRYPTION_KEY) silently
          # leaves prod on a stale env. refresh-env.sh does an atomic mktemp->mv
          # under `set -euo pipefail`, so a Secrets Manager hiccup aborts the
          # deploy and leaves the existing good .env untouched.
          REFRESH_B64=$(base64 -w0 deploy/refresh-env.sh 2>/dev/null || base64 -b0 deploy/refresh-env.sh)
          CMD_ID=$(aws ssm send-command \
              --region "$AWS_REGION" \
              --instance-ids "$EC2_INSTANCE_ID" \
              --document-name AWS-RunShellScript \
              --comment "Deploy $(echo "${GITHUB_SHA}" | cut -c1-7)" \
              --cloud-watch-output-config '{"CloudWatchLogGroupName":"/mda-dashboard/ec2-system","CloudWatchOutputEnabled":true}' \
              --parameters "{\"commands\":[
                \"set -e\",
                \"cd /opt/mda-dashboard\",
                \"sudo /home/ec2-user/ecr-login.sh\",
                \"echo ${COMPOSE_B64} | base64 -d | sudo tee /opt/mda-dashboard/docker-compose.yml > /dev/null\",
                \"sudo chown ec2-user:ec2-user /opt/mda-dashboard/docker-compose.yml\",
                \"echo ${REFRESH_B64} | base64 -d | sudo tee /opt/mda-dashboard/refresh-env.sh > /dev/null\",
                \"sudo chmod +x /opt/mda-dashboard/refresh-env.sh\",
                \"sudo /opt/mda-dashboard/refresh-env.sh\",
                \"sudo docker compose pull\",
                \"sudo docker compose up -d --remove-orphans\",
                \"sleep 8\",
                \"sudo docker compose ps\",
                \"curl -fsS http://localhost:8080/api/health\",
                \"echo Deployment complete\"
              ],\"executionTimeout\":[\"600\"]}" \
              --query "Command.CommandId" --output text)
          echo "SSM Command ID: $CMD_ID"

          # Poll until terminal state
          while true; do
            STATUS=$(aws ssm get-command-invocation \
                --region "$AWS_REGION" \
                --command-id "$CMD_ID" \
                --instance-id "$EC2_INSTANCE_ID" \
                --query Status --output text 2>/dev/null || echo "Pending")
            case "$STATUS" in
              Success|Failed|TimedOut|Cancelled|Cancelling)
                break ;;
            esac
            sleep 4
          done

          echo
          echo "── Final status: $STATUS ──"
          echo "── stdout ──"
          aws ssm get-command-invocation \
              --region "$AWS_REGION" \
              --command-id "$CMD_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query StandardOutputContent --output text || true
          echo "── stderr ──"
          aws ssm get-command-invocation \
              --region "$AWS_REGION" \
              --command-id "$CMD_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query StandardErrorContent --output text || true

          [[ "$STATUS" == "Success" ]] || exit 1

      - name: Tag GitHub release on main pushes
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "Image deployed: ${ECR_REPO}:${{ steps.tag.outputs.tag }}"
          echo "Live at https://eha-mda-dashboard.ehealthnigeria.org"
